<!-- 
  THEME.HTML - INTEGRITY SHAPE v2
  Ce thème modifie la structure géométrique du site.
-->

<style>
  :root {
    --bg-color: #040812;
    --text-color: #d1d9e6;
    --heading-color: #ffcf40; /* Or Pur */
    --accent-color: #00b4ff;  /* Bleu Empyrée */
    --border-color: rgba(255, 207, 64, 0.4);
    
    /* Variables de forme */
    --sidebar-width: 280px;
    --panel-bg: rgba(10, 20, 40, 0.85);
  }

  /* 1. RÉORGANISATION GÉOMÉTRIQUE DU SITE */
  
  /* On décolle la sidebar du bord et on lui donne une forme biseautée */
  .sidebar {
    left: 20px !important;
    top: 20px !important;
    height: calc(100vh - 40px) !important;
    width: var(--sidebar-width) !important;
    background: var(--panel-bg) !important;
    backdrop-filter: blur(10px);
    border: 1px solid var(--border-color) !important;
    border-radius: 0px !important;
    /* Coupe biseautée type SAO sur les coins */
    clip-path: polygon(0 0, 100% 0, 100% 95%, 85% 100%, 0 100%);
    box-shadow: 0 0 30px rgba(0, 180, 255, 0.1) !important;
  }

  /* On centre le contenu dans une "Plaque d'Armure" flottante */
  .content {
    left: calc(var(--sidebar-width) + 60px) !important;
    right: 40px !important;
    top: 20px !important;
    transition: all 0.3s ease;
  }

  .markdown-section {
    max-width: 900px !important;
    margin: 0 auto !important;
    background: rgba(255, 255, 255, 0.03) !important;
    padding: 60px !important;
    border: 1px solid rgba(255, 207, 64, 0.2) !important;
    position: relative;
    /* Forme octogonale allongée */
    clip-path: polygon(3% 0, 97% 0, 100% 5%, 100% 95%, 97% 100%, 3% 100%, 0 95%, 0 5%);
    box-shadow: 0 10px 50px rgba(0,0,0,0.5);
  }

  /* Ajout de coins décoratifs dorés sur la plaque de contenu */
  .markdown-section::before, .markdown-section::after {
    content: "";
    position: absolute;
    width: 40px;
    height: 40px;
    border: 2px solid var(--heading-color);
    pointer-events: none;
  }
  .markdown-section::before { top: 10px; left: 10px; border-right: none; border-bottom: none; }
  .markdown-section::after { bottom: 10px; right: 10px; border-left: none; border-top: none; }

  /* 2. EFFETS VISUELS DE FOND */
  .animated-background {
    background: radial-gradient(circle at 50% 50%, #0a1e3d 0%, #02050a 100%) !important;
  }
  .animated-background::before, .animated-background::after { display: none !important; }

  /* Grille de visée "System Call" en fond */
  .integrity-grid {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: 
      linear-gradient(rgba(0, 180, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 180, 255, 0.05) 1px, transparent 1px);
    background-size: 100px 100px;
    z-index: -1;
    mask-image: radial-gradient(circle, black 30%, transparent 80%);
  }

  /* 3. TYPOGRAPHIE ET COULEURS */
  .sidebar > h1 {
    font-family: 'Georgia', serif; /* Plus noble */
    letter-spacing: 3px;
    color: var(--heading-color) !important;
    text-shadow: 0 0 10px rgba(255, 207, 64, 0.5) !important;
  }

  .sidebar-nav ul li a {
    color: #a0aec0 !important;
    border-left: 2px solid transparent;
    margin-bottom: 5px;
  }

  .sidebar-nav ul li.active > a {
    background: linear-gradient(90deg, rgba(255, 207, 64, 0.2), transparent) !important;
    border-left: 3px solid var(--heading-color) !important;
    color: #fff !important;
    box-shadow: none !important;
  }

  /* Titres SAO Style */
  .markdown-section h1 {
    font-size: 3rem !important;
    background: linear-gradient(to bottom, #fff 40%, var(--heading-color) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
  }

  .markdown-section h2 {
    border-bottom: 2px solid var(--heading-color) !important;
    padding-bottom: 10px;
    display: flex;
    align-items: center;
  }
  .markdown-section h2::after {
    content: "";
    flex-grow: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--heading-color), transparent);
    margin-left: 20px;
  }

  /* 4. ÉLÉMENTS DE SYSTÈME (MARKDOWN) */
  .markdown-section code {
    background: rgba(0, 180, 255, 0.1) !important;
    color: var(--accent-color) !important;
    border: 1px solid var(--accent-color) !important;
    border-radius: 0 !important;
    clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
    padding: 3px 15px !important;
  }

  /* Bouton Partenaire (Si lien) */
  .markdown-section a {
    color: var(--heading-color) !important;
    text-decoration: none;
    font-weight: bold;
    padding: 2px 5px;
    transition: 0.3s;
  }
  .markdown-section a:hover {
    background: var(--heading-color);
    color: #000 !important;
  }

  /* Scrollbar fine Gold */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--heading-color) !important; }

  /* Responsive Fix */
  @media screen and (max-width: 768px) {
    .sidebar { left: 0 !important; top: 0 !important; height: 100% !important; clip-path: none !important; }
    .content { left: 0 !important; right: 0 !important; top: 0 !important; }
    .markdown-section { clip-path: none !important; padding: 20px !important; }
  }
</style>

<!-- HTML DE STRUCTURE -->
<div class="integrity-grid"></div>
