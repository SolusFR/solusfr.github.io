<style>
  :root {
    --bg-color: #03060b;
    --text-color: #e3f2fd;
    --heading-color: #ffd700;
    --accent-color: #00e5ff;
    --gold-border: #d4af37;
    --panel-bg: rgba(5, 15, 30, 0.95);
  }

  /* --- 1. BASE & NETTOYAGE --- */
  body { background-color: var(--bg-color) !important; }
  .animated-background { background: #03060b !important; }
  .animated-background::before, .animated-background::after { display: none !important; }

  /* --- 2. STRUCTURE DESKTOP (PC) --- */
  @media screen and (min-width: 769px) {
    .sidebar {
      position: fixed !important;
      top: 20px !important;
      left: 20px !important;
      height: calc(100vh - 40px) !important;
      width: 280px !important;
      background: var(--panel-bg) !important;
      backdrop-filter: blur(15px);
      border: 1px solid var(--gold-border) !important;
      clip-path: polygon(0% 0%, 100% 0%, 100% 90%, 85% 100%, 0% 100%);
      z-index: 100;
    }
    .content {
      margin-left: 320px !important;
      padding: 40px !important;
    }
    .markdown-section {
      max-width: 900px !important;
      background: var(--panel-bg) !important;
      padding: 50px !important;
      border: 1px solid rgba(212, 175, 55, 0.3) !important;
      clip-path: polygon(3% 0%, 97% 0%, 100% 5%, 100% 95%, 97% 100%, 3% 100%, 0% 95%, 0% 5%);
    }
  }

  /* --- 3. STRUCTURE MOBILE (FIX) --- */
  @media screen and (max-width: 768px) {
    /* On laisse Docsify gérer la position, on change juste le look */
    .sidebar {
      background-color: var(--panel-bg) !important;
      border-right: 1px solid var(--gold-border) !important;
      box-shadow: 10px 0 30px rgba(0,0,0,0.8) !important;
      left: 0 !important; /* Important pour Docsify mobile */
      transition: transform 0.3s ease !important;
    }

    .content {
      left: 0 !important;
      margin-left: 0 !important;
      width: 100% !important;
      padding: 0 !important;
    }

    .markdown-section {
      padding: 20px 15px !important;
      background: transparent !important; /* Plus léger sur mobile */
      border: none !important;
      clip-path: none !important; /* On retire la forme complexe sur mobile */
    }

    /* Fix du bouton de menu (Toggle) */
    .sidebar-toggle {
      background: var(--bg-color) !important;
      border: 1px solid var(--gold-border) !important;
      width: 44px !important;
      height: 44px !important;
      bottom: 20px !important;
      left: 20px !important;
      z-index: 1001 !important;
      display: flex !important;
      align-items: center;
      justify-content: center;
    }
  }

  /* --- 4. STYLE INTERNE (ANTI-ROUGE) --- */

  /* Titres */
  .markdown-section h1, .markdown-section h2, .markdown-section h3 {
    color: var(--heading-color) !important;
    text-shadow: 0 0 12px rgba(212, 175, 55, 0.4) !important;
  }
  .markdown-section h2::before { content: "⚔️ " !important; color: var(--heading-color) !important; text-shadow: none !important; }
  .markdown-section h2 { border-bottom: 1px solid var(--gold-border) !important; }

  /* Écrase le Rose/Rouge au Hover (Menu) */
  .sidebar-nav ul li a:hover {
    color: var(--heading-color) !important;
    background: rgba(212, 175, 55, 0.1) !important;
    text-shadow: 0 0 8px var(--heading-color) !important;
  }
  .sidebar-nav ul li.active > a {
    background: linear-gradient(90deg, rgba(212, 175, 55, 0.3), transparent) !important;
    color: #fff !important;
    border-left: 3px solid var(--heading-color) !important;
    box-shadow: none !important;
  }

  /* Markdown Elements */
  .markdown-section code {
    background: rgba(0, 229, 255, 0.1) !important;
    color: var(--accent-color) !important;
    border: 1px solid var(--accent-color) !important;
  }
  .markdown-section hr {
    background: linear-gradient(90deg, transparent, var(--gold-border), transparent) !important;
    height: 1px !important;
    border: none !important;
  }
  .markdown-section table th { background: rgba(212, 175, 55, 0.2) !important; color: var(--heading-color) !important; }
  .markdown-section table td { border-bottom: 1px solid rgba(212, 175, 55, 0.2) !important; }

  /* Barre de recherche */
  .sidebar .search input {
    color: var(--accent-color) !important;
    border: 1px solid var(--gold-border) !important;
    background: rgba(0,0,0,0.5) !important;
  }

  /* --- 5. EFFETS VISUELS --- */
  .sacred-circle {
    position: fixed; bottom: -100px; right: -100px; width: 500px; height: 500px;
    border: 1px solid rgba(0, 229, 255, 0.15); border-radius: 50%; z-index: -1;
    animation: rotate-sacred 30s linear infinite;
  }
  @keyframes rotate-sacred { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .scanline {
    position: fixed; top: 0; left: 0; width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
    opacity: 0.1; z-index: 1000; animation: scan 8s linear infinite;
  }
  @keyframes scan { 0% { top: 0; } 100% { top: 100vh; } }
</style>

<!-- HTML -->
<div class="sacred-circle"></div>
<div class="scanline"></div>
