<style>
  /* =========================================
     🌑 THÈME : NAZGÛL // MINAS MORGUL
     ========================================= */
  :root {
    /* Couleurs de base */
    --theme-color: #00ffaa;           /* Vert spectral Morgul */
    --theme-dim: rgba(0, 255, 170, 0.1);
    --theme-glow: rgba(0, 255, 170, 0.6);
    --bg-main: #05080a;               /* Noir profond acier */
    
    /* Typographie */
    --font-headers: 'Cinzel', serif;
    --font-body: 'Poppins', sans-serif;
    
    /* Interface */
    --ui-radius: 0px;                 /* Angles vifs pour l'armure */
    --ui-border: 1px solid #1a3a2a;
    --theme-icon: "⚔️";               /* Épée des spectres */
    
    /* Variables additionnelles pour le pattern */
    --bg-pattern: radial-gradient(circle at 50% 50%, #0a1f16 0%, #05080a 100%);
  }

  /* --- 1. STRUCTURE & DÉFILEMENT (FIX) --- */
  body {
    background-color: var(--bg-main) !important;
    background-image: var(--bg-pattern) !important;
  }

  /* On s'assure que le scroll fonctionne dans la zone principale */
  .content {
    background: rgba(8, 10, 12, 0.9) !important;
    border-left: 2px solid var(--theme-color) !important;
    box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5) !important;
    /* Coupe en biseau pour le look armure */
    clip-path: polygon(2% 0, 100% 0, 100% 100%, 0 100%, 0 5%) !important;
  }

  /* --- 2. SIDEBAR SPECTRAL --- */
  .sidebar {
    background: rgba(5, 8, 10, 0.8) !important;
    backdrop-filter: blur(15px) !important;
    border-right: 1px solid #1a3a2a !important;
  }

  .sidebar-nav ul li a {
    color: #667c71 !important;
    font-family: var(--font-headers) !important;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .sidebar-nav li.collapse:not(.close) > a {
    color: var(--theme-color) !important;
    text-shadow: 0 0 10px var(--theme-glow);
  }

  /* --- 3. ÉRADICATION DU ROSE --- */
  /* On force toutes les couleurs dynamiques de Docsify */
  .search input {
    border: 1px solid #1a3a2a !important;
    color: var(--theme-color) !important;
  }

  .markdown-section a, .markdown-section strong {
    color: var(--theme-color) !important;
    text-shadow: 0 0 5px var(--theme-dim);
  }

  /* Correction des puces et check-boxes */
  .markdown-section ul li::before {
    color: var(--theme-color) !important;
  }

  /* --- 4. TITRES & LISIBILITÉ --- */
  .markdown-section h1, .markdown-section h2 {
    font-family: var(--font-headers) !important;
    color: var(--theme-color) !important;
    text-shadow: 0 0 15px rgba(0, 255, 170, 0.3) !important;
  }
</style>

<div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden;">
    <div style="position: absolute; bottom: 10%; right: 5%; opacity: 0.03; font-family: 'Cinzel', serif; font-size: 150px; color: #00ffaa; transform: rotate(-10deg);">
        MORDOR
    </div>
    
    <div style="position: absolute; top: -10%; left: -10%; width: 50%; height: 50%; background: radial-gradient(circle, rgba(0, 255, 170, 0.08) 0%, transparent 70%); filter: blur(50px);"></div>
</div>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<script>
  // Script spécifique au dossier pour nettoyer les résidus roses
  (function() {
    const nazgulCleanup = () => {
      // Supprime la barre rose ou grise de toggle qui revient parfois
      const toggle = document.querySelector('.sidebar-toggle');
      if (toggle) toggle.style.display = 'none';

      // On s'assure que le scroll de la sidebar ne bloque pas
      const sidebar = document.querySelector('.sidebar');
      if (sidebar) sidebar.style.overflowY = 'auto';
    };

    nazgulCleanup();
    setInterval(nazgulCleanup, 1000);
  })();
</script>
