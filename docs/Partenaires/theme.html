<style>
  /* --- 1. ÉRADICATION DU ROSE ET DES BUGS --- */
  :root {
    --theme-color: #00ffaa !important; /* Force le vert spectral partout */
  }

  /* Supprime le rose sur les soulignements, les puces et les barres */
  .markdown-section a, .markdown-section em, .sidebar-nav li.active > a {
    color: #00ffaa !important;
    border-bottom-color: #00ffaa !important;
  }

  /* Change la couleur des puces d'étoiles roses vues sur tes captures */
  .markdown-section ul li::before {
    color: #00ffaa !important;
    content: "◈" !important; /* Remplace l'étoile par un losange spectral */
  }

  /* Nettoyage des barres et boutons de l'ancien thème */
  .sidebar-toggle, #theme-picker, .app-nav, #stars-container {
    display: none !important;
  }

  /* --- 2. NOUVELLE FORME DU SITE (LOOK ARMURE) --- */
  html, body {
    background: #050708 !important;
    overflow: hidden !important;
  }

  /* Sidebar détachée façon menu VR Nazgûl */
  .sidebar {
    left: 20px !important;
    top: 20px !important;
    height: calc(100vh - 40px) !important;
    background: rgba(10, 15, 12, 0.9) !important;
    border: 1px solid #1a3a2a !important;
    clip-path: polygon(0% 0%, 100% 0%, 100% 95%, 85% 100%, 0% 100%) !important;
    box-shadow: 10px 10px 30px rgba(0,0,0,0.8) !important;
    z-index: 100 !important;
  }

  /* Zone de texte façon "Stèle de Fer" */
  .content {
    left: 320px !important;
    right: 20px !important;
    top: 20px !important;
    bottom: 20px !important;
    width: auto !important;
    height: auto !important;
    background: #080a0c !important;
    border: 1px solid #1a3a2a !important;
    border-top: 4px solid #00ffaa !important; /* Barre de titre spectrale */
    overflow-y: auto !important;
    padding: 40px !important;
    box-shadow: 0 0 40px rgba(0, 255, 170, 0.05) !important;
  }

  /* --- 3. LISIBILITÉ ET TYPO (ADIEU LE FLOU) --- */
  .markdown-section {
    color: #cbd5e0 !important; /* Gris acier très lisible */
    font-family: 'Cinzel', serif !important;
  }

  .markdown-section h1, .markdown-section h2 {
    color: #00ffaa !important;
    text-shadow: 0 0 10px rgba(0, 255, 170, 0.3) !important;
    text-align: left !important;
    border: none !important;
  }

  /* Boutons du menu */
  .sidebar-nav ul li a {
    color: #667c71 !important;
    padding: 12px !important;
    border-radius: 4px !important;
    transition: 0.3s !important;
  }

  .sidebar-nav ul li.active > a, .sidebar-nav ul li a:hover {
    background: rgba(0, 255, 170, 0.1) !important;
    color: #fff !important;
    border-left: 4px solid #00ffaa !important;
  }
</style>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<script>
  (function() {
    const applyNazgul = () => {
      // Supprime le bouton de menu en bas à gauche qui restait sur tes images
      const toggle = document.querySelector('.sidebar-toggle');
      if(toggle) toggle.remove();
      
      // Change le texte du titre
      const title = document.querySelector('.sidebar h1 a');
      if(title) title.innerText = "◈ NAZGÛL WIKI";
    };

    applyNazgul();
    setInterval(applyNazgul, 1000);
  })();
</script>
