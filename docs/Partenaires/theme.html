<style>
  /* --- 1. PURGE TOTALE ET RESET --- */
  :root {
    --knight-gold: #f1c40f;
    --knight-blue: #0066ff;
    --axiom-bg: #030508;
  }

  /* Cache absolument tout ce qui touche à Oshi no Ko */
  #theme-picker, #stars-container, .star, .cursor-glow, .background-overlay, .fx-star, .fx-heart {
    display: none !important;
    opacity: 0 !important;
  }

  /* --- 2. LE FOND "DIVINE AURA" --- */
  body {
    background: var(--axiom-bg) !important;
    background-image: 
      radial-gradient(circle at 50% 50%, rgba(0, 102, 255, 0.15) 0%, transparent 70%),
      linear-gradient(rgba(241, 196, 15, 0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(241, 196, 15, 0.02) 1px, transparent 1px) !important;
    background-size: cover, 40px 40px, 40px 40px !important;
    overflow-x: hidden;
  }

  /* --- 3. REPOSITIONNEMENT DE LA SIDEBAR (DROITE + FLOTTANTE) --- */
  .sidebar {
    left: auto !important;
    right: 20px !important; /* Déplacée à DROITE */
    top: 50% !important;
    transform: translateY(-50%) !important;
    height: 70vh !important;
    width: 260px !important;
    background: rgba(10, 20, 40, 0.8) !important;
    backdrop-filter: blur(20px) !important;
    border: 2px solid var(--knight-gold) !important;
    border-radius: 15px 0 0 15px !important;
    box-shadow: -10px 0 30px rgba(0, 102, 255, 0.3) !important;
    z-index: 100 !important;
  }

  .sidebar-nav { padding: 20px !important; }
  .sidebar h1 { 
    font-family: 'Cinzel', serif; 
    font-size: 1.2em !important; 
    color: var(--knight-gold) !important;
    text-align: right;
  }

  /* --- 4. ZONE DE CONTENU "HOLOGRAMME" --- */
  .content {
    left: 40px !important;
    right: 320px !important; /* On laisse de la place pour la sidebar à droite */
    top: 50px !important;
    position: relative !important;
    width: auto !important;
    background: rgba(255, 255, 255, 0.03) !important;
    border: 1px solid rgba(241, 196, 15, 0.2) !important;
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.5) !important;
    padding: 40px !important;
    min-height: 80vh;
  }

  /* --- 5. EFFETS VISUELS "RELEASE RECOLLECTION" --- */
  /* Titre avec animation de flash doré */
  .markdown-section h1 {
    font-family: 'Cinzel', serif;
    color: #fff !important;
    text-shadow: 0 0 15px var(--knight-gold) !important;
    border-bottom: 2px solid var(--knight-gold) !important;
    padding-bottom: 15px;
    text-align: left;
  }

  /* Pétales d'Osmanthus massifs */
  .divine-petal {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--knight-gold);
    border-radius: 100% 0 100% 0;
    pointer-events: none;
    z-index: 9999;
    filter: drop-shadow(0 0 5px var(--knight-gold));
    animation: divineFall 8s infinite linear;
  }

  @keyframes divineFall {
    0% { transform: translateY(-10vh) rotate(0deg) scale(0.5); opacity: 0; }
    50% { opacity: 1; transform: translateY(50vh) rotate(180deg) scale(1.2) translateX(50px); }
    100% { transform: translateY(110vh) rotate(360deg) scale(0.5) translateX(-50px); opacity: 0; }
  }

  /* --- 6. BARRE DE NAVIGATION (TOP) --- */
  .app-nav {
    left: 40px !important;
    right: auto !important;
    background: transparent !important;
    border: 1px solid var(--knight-gold) !important;
    padding: 10px 20px !important;
    border-radius: 5px !important;
  }
</style>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<script>
  (function() {
    // 1. On force la suppression des boutons de thèmes si le CSS ne suffit pas
    const removeOshi = () => {
      const picker = document.getElementById('theme-picker');
      if (picker) picker.remove();
    };
    removeOshi();
    setInterval(removeOshi, 1000); // Au cas où Docsify le recréerait

    // 2. Générateur de particules Osmanthus (Alice's Sword)
    const spawnPetal = () => {
      const p = document.createElement('div');
      p.className = 'divine-petal';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (Math.random() * 3 + 6) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 8000);
    };
    setInterval(spawnPetal, 400);

    // 3. Texte de chargement personnalisé
    const loaderText = document.querySelector('.loader-text');
    if (loaderText) {
      loaderText.innerHTML = "SYSTEM CALL: GENERATE LUMINOSITY ELEMENT";
      loaderText.style.color = "#f1c40f";
    }

    console.log("🛡️ Integrity Protocol: Axiom Overwrite Complete.");
  })();
</script>
