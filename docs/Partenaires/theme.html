<style>
  /* --- 1. RESET COMPLET & NETTOYAGE DES BUGS --- */
  html, body {
    background: #1a0f05 !important; /* Fond sombre pour faire ressortir le parchemin */
    overflow-x: hidden !important;
  }

  /* Suppression chirurgicale des barres grises et boutons roses vus sur tes captures */
  .sidebar-toggle, #theme-picker, .app-nav, .search, #stars-container, #fx-container {
    display: none !important;
    opacity: 0 !important;
  }

  /* --- 2. LE PARCHEMIN GLOBAL (CONTENU) --- */
  .content {
    background: #e9dcc0 !important; /* Couleur papier vieilli plus riche */
    background-image: url('https://www.transparenttextures.com/patterns/paper.png') !important;
    border: 20px solid transparent !important;
    border-image: url('https://i.imgur.com/8S9S8pX.png') 40 round !important; /* Bordure ornementale */
    box-shadow: 0 0 50px rgba(0,0,0,0.8) !important;
    margin: 40px auto !important;
    max-width: 900px !important;
    min-height: 80vh !important;
    position: relative !important;
    z-index: 10 !important;
  }

  /* Correction Lisibilité : Texte en "Encre de Chine" */
  .markdown-section {
    color: #2a1b0a !important; /* Marron très foncé, presque noir pour la lecture */
    font-family: 'Crimson Text', serif !important;
    line-height: 1.6 !important;
  }

  .markdown-section h1, .markdown-section h2 {
    font-family: 'Cinzel', serif !important;
    color: #5d3a1a !important;
    text-align: center !important;
    border-bottom: 2px solid rgba(139, 69, 19, 0.3) !important;
  }

  /* --- 3. LA SIDEBAR : MANUSCRIT ANCIEN --- */
  .sidebar {
    background: #dccba6 !important; /* Teinte légèrement différente pour séparer */
    border-right: 3px double #8b4513 !important;
    box-shadow: 5px 0 15px rgba(0,0,0,0.3) !important;
    z-index: 100 !important;
  }

  /* Titre de la sidebar style "Inscription de l'Anneau" */
  .sidebar h1 a {
    font-family: 'Papyrus', 'Palatino', serif !important;
    color: #3d2419 !important;
    text-shadow: 1px 1px 0px #fff !important;
    font-weight: bold !important;
  }

  /* Liens (Minecraft, Partenaires...) : On force le contraste */
  .sidebar-nav ul li a {
    color: #4b2c20 !important; /* Marron foncé pour être lisible */
    font-weight: 700 !important;
    font-size: 1.1em !important;
    border: none !important;
  }

  .sidebar-nav ul li.active > a, .sidebar-nav ul li a:hover {
    color: #b30000 !important; /* Rouge sang/sacré pour la sélection */
    background: rgba(139, 69, 19, 0.1) !important;
    border-left: 4px solid #b30000 !important;
  }

  /* --- 4. EFFET DE LUMIÈRE (L'UNIQUE ANNEAU) --- */
  .markdown-section strong, .markdown-section b {
    color: #b30000 !important; /* On met les éléments importants en rouge "Anneau" */
    text-shadow: 0 0 2px rgba(179, 0, 0, 0.2) !important;
  }
</style>

<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">

<script>
  (function() {
    // Nettoyage agressif des éléments Docsify vus sur les captures
    const cleanupLOTR = () => {
        const bugs = ['.sidebar-toggle', '#theme-picker', '.app-nav', '.search'];
        bugs.forEach(selector => {
            const el = document.querySelector(selector);
            if(el) el.remove();
        });
        
        // On change le titre pour l'immersion
        const title = document.querySelector('.sidebar h1 a');
        if(title) title.innerText = "📜 LE LIVRE ROUGE";
    };

    cleanupLOTR();
    setInterval(cleanupLOTR, 1000);
  })();
</script>
