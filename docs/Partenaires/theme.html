<style>
  /* --- 1. OVERRIDE GLOBAL DU MOTEUR (FINI LE ROSE) --- */
  :root {
    --theme-color: #00ffaa !important;
    --docsifytabs-tab-highlight-color: #00ffaa !important;
  }

  /* Tue le rose sur les fonds, bordures et lignes horizontales du MD */
  .markdown-section hr, 
  .markdown-section blockquote,
  .markdown-section code,
  .markdown-section p,
  .markdown-section table,
  .markdown-section tr:nth-child(2n) {
    border-color: #1a3a2a !important;
    background-color: rgba(0, 255, 170, 0.02) !important;
  }

  /* Cible spécifiquement les éléments roses vus sur tes captures */
  .markdown-section a, 
  .markdown-section strong, 
  .markdown-section span.token,
  .anchor span {
    color: #00ffaa !important;
    text-shadow: 0 0 8px rgba(0, 255, 170, 0.4) !important;
    border-bottom-color: transparent !important;
  }

  /* --- 2. LA STRUCTURE SPECTRE (FORME AMÉLIORÉE) --- */
  html, body { background: #010203 !important; overflow: hidden !important; }

  /* Sidebar : Effet glow vert pur (fini le halo rose) */
  .sidebar {
    background: #050708 !important;
    border: none !important;
    box-shadow: 15px 0 35px rgba(0, 0, 0, 0.95), 5px 0 15px rgba(0, 255, 170, 0.05) !important;
    clip-path: polygon(0 0, 100% 0, 100% 90%, 80% 100%, 0 100%) !important;
  }

  /* Contenu : Stèle de Minas Morgul détachée */
  .content {
    background: #080a0c !important;
    border: 1px solid #1a3a2a !important;
    border-top: 3px solid #00ffaa !important;
    border-left: 3px solid #00ffaa !important;
    clip-path: polygon(4% 0, 100% 0, 100% 100%, 0 100%, 0 8%) !important;
    box-shadow: 0 0 50px rgba(0, 0, 0, 1) !important;
    padding: 50px !important;
    left: 320px !important;
    margin-top: 15px !important;
    height: calc(100vh - 30px) !important;
  }

  /* --- 3. LISIBILITÉ D'ACIER (FIX IMAGE_73E959) --- */
  .markdown-section {
    color: #d1d5db !important;
    font-family: 'Cinzel', serif !important;
  }

  .sidebar-nav li.active > a, .sidebar-nav li a:hover {
    background: linear-gradient(90deg, rgba(0, 255, 170, 0.2) 0%, transparent 100%) !important;
    color: #ffffff !important;
    text-shadow: 0 0 10px #00ffaa !important;
  }

  /* Masque les résidus vus sur image_73f443.jpg */
  .sidebar-toggle, #theme-picker, .app-nav, #stars-container {
    display: none !important;
    visibility: hidden !important;
  }
</style>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<script>
  (function() {
    const antiPinkForce = () => {
      // On traque et on détruit toute couleur rose/magenta injectée dynamiquement
      const allElements = document.querySelectorAll('*');
      allElements.forEach(el => {
        const style = window.getComputedStyle(el);
        const pinkTerms = ['255, 51, 153', 'rgb(255, 0, 255)', 'pink', '#ff3399'];
        
        if (pinkTerms.some(term => style.color.includes(term) || style.borderColor.includes(term) || style.boxShadow.includes(term))) {
          el.style.setProperty('color', '#00ffaa', 'important');
          el.style.setProperty('border-color', '#1a3a2a', 'important');
          el.style.setProperty('box-shadow', '0 0 5px #00ffaa', 'important');
        }
      });

      // Suppression de la barre grise en bas
      const toggle = document.querySelector('.sidebar-toggle');
      if(toggle) toggle.remove();
    };

    antiPinkForce();
    setInterval(antiPinkForce, 300); // Surveillance constante
  })();
</script>
