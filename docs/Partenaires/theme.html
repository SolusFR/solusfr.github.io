<style>
  /* --- 1. RESET & FOND PROFOND --- */
  :root {
    --theme-color: #00ffaa !important; /* Vert Émeraude Spectral */
  }

  html, body {
    background: #0a0c10 !important;
    margin: 0 !important;
    height: 100% !important;
    overflow: hidden !important;
  }

  /* --- 2. LA STÈLE DE DONNÉES (CONTENU SCROLLABLE) --- */
  .content {
    position: absolute !important;
    top: 20px !important;
    left: 320px !important;
    right: 20px !important;
    bottom: 20px !important;
    background: rgba(13, 17, 23, 0.95) !important;
    border: 1px solid #1f2937 !important;
    border-left: 4px solid #00ffaa !important; /* Ligne de flux énergétique */
    box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
    padding: 50px !important;
    overflow-y: auto !important; /* RÉACTIVE LE SCROLL SANS BUG */
    z-index: 1 !important;
    border-radius: 8px !important;
  }

  /* --- 3. SIDEBAR : INTERFACE DE COMMANDEMENT --- */
  .sidebar {
    background: transparent !important;
    border: none !important;
    width: 280px !important;
    padding-top: 40px !important;
  }

  /* Titre du Wiki */
  .sidebar h1 a {
    font-family: 'Orbitron', sans-serif !important;
    color: #fff !important;
    text-shadow: 0 0 10px #00ffaa !important;
    letter-spacing: 2px !important;
  }

  /* Liens du menu (Supprime le rose et le glow inutile) */
  .sidebar-nav ul li a {
    color: #8b949e !important;
    font-family: 'Inter', sans-serif !important;
    transition: 0.2s ease !important;
    border: none !important;
  }

  .sidebar-nav li.active > a, .sidebar-nav li a:hover {
    color: #00ffaa !important;
    background: rgba(0, 255, 170, 0.05) !important;
    border-right: 3px solid #00ffaa !important;
  }

  /* --- 4. LISIBILITÉ & TYPOGRAPHIE (FINI LE ROSE) --- */
  .markdown-section {
    color: #c9d1d9 !important; /* Gris clair texturé pour lecture parfaite */
    font-family: 'Inter', sans-serif !important;
    line-height: 1.8 !important;
  }

  .markdown-section h1, .markdown-section h2 {
    color: #f0f6fc !important;
    border-bottom: 1px solid #30363d !important;
    padding-bottom: 10px !important;
  }

  /* Écrase les résidus roses des captures (puces, liens, b) */
  .markdown-section strong, .markdown-section b, .markdown-section a {
    color: #00ffaa !important;
    text-decoration: none !important;
  }

  /* Transforme les puces roses en indicateurs Cyber */
  .markdown-section ul li::before {
    color: #00ffaa !important;
    content: "↪" !important;
  }

  /* --- 5. NETTOYAGE DES ÉLÉMENTS GRIS/ROSES BUGGÉS --- */
  .sidebar-toggle, #theme-picker, .app-nav, .search input::placeholder {
    display: none !important;
    visibility: hidden !important;
  }

  /* Scrollbar Custom */
  .content::-webkit-scrollbar { width: 5px; }
  .content::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
  .content::-webkit-scrollbar-thumb:hover { background: #00ffaa; }
</style>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">

<script>
  (function() {
    const cyberPurge = () => {
      // Supprime la barre de menu mobile grise vue sur image_73f443.jpg
      const bug = document.querySelector('.sidebar-toggle');
      if(bug) bug.remove();

      // Nettoyage manuel des couleurs roses injectées par Docsify
      document.querySelectorAll('*').forEach(el => {
        const style = window.getComputedStyle(el);
        if (style.color.includes('255, 51') || style.borderColor.includes('255, 51')) {
          el.style.setProperty('color', '#00ffaa', 'important');
          el.style.setProperty('border-color', '#1f2937', 'important');
        }
      });
    };

    cyberPurge();
    setInterval(cyberPurge, 500);
  })();
</script>
