<style>
  /* --- 1. DESTRUCTION TOTALE DU LAYOUT --- */
  :root {
    --knight-gold: #f1c40f;
    --divine-blue: #0088ff;
    --axiom-dark: #020408;
    --glass: rgba(255, 255, 255, 0.03);
  }

  /* Cache absolument TOUT ce qui appartient au site de base */
  #theme-picker, #stars-container, .star, .cursor-glow, .background-overlay, 
  .fx-star, .fx-heart, .docsify-tabs__tab, .search, .app-nav {
    display: none !important;
  }

  /* --- 2. LE FOND : L'UNDERWORLD --- */
  body {
    background: var(--axiom-dark) !important;
    background-image: 
      radial-gradient(circle at 50% 50%, #002244 0%, #020408 100%) !important;
    height: 100vh;
    overflow: hidden !important; /* On bloque le scroll du body pour le gérer dans la stèle */
  }

  /* --- 3. LA STRUCTURE : LA STÈLE DE CRISTAL --- */
  main {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1000px;
  }

  /* Le panneau de contenu (La Stèle) */
  .content {
    position: relative !important;
    width: 850px !important;
    height: 85vh !important;
    margin: 0 !important;
    background: var(--glass) !important;
    backdrop-filter: blur(30px) !important;
    border: 1px solid rgba(241, 196, 15, 0.4) !important;
    box-shadow: 0 0 50px rgba(0, 0, 0, 0.9), 
                inset 0 0 30px rgba(0, 136, 255, 0.1) !important;
    overflow-y: auto !important; /* Le scroll est ICI maintenant */
    padding: 60px !important;
    z-index: 5;
    border-radius: 4px;
  }

  /* --- 4. LA SIDEBAR : MENU VR (SAO STYLE) --- */
  .sidebar {
    left: auto !important;
    right: 50px !important;
    width: 280px !important;
    height: auto !important;
    max-height: 60vh;
    top: 50% !important;
    transform: translateY(-50%) rotateY(-15deg) !important; /* Effet 3D flottant */
    background: transparent !important;
    border: none !important;
    z-index: 10 !important;
  }

  .sidebar-nav > ul > li {
    background: rgba(0, 0, 0, 0.6) !important;
    border: 1px solid var(--knight-gold) !important;
    margin-bottom: 10px !important;
    padding: 10px !important;
    clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%); /* Forme géométrique */
    transition: 0.3s;
  }

  .sidebar-nav ul li a {
    color: var(--knight-gold) !important;
    font-family: 'Cinzel', serif;
    text-decoration: none !important;
    text-align: center;
    font-weight: bold;
  }

  .sidebar-nav ul li:hover {
    background: var(--knight-gold) !important;
    transform: translateX(-10px);
  }

  .sidebar-nav ul li:hover a { color: #000 !important; }

  /* --- 5. DÉCORATIONS ET EFFETS "ENHANCE ARMAMENT" --- */
  .markdown-section h1 {
    font-family: 'Cinzel', serif;
    font-size: 3em !important;
    text-shadow: 0 0 20px var(--knight-gold);
    color: #fff !important;
    border-bottom: 4px double var(--knight-gold) !important;
    margin-bottom: 50px !important;
  }

  /* Les bordures de coin divines */
  .content::before, .content::after {
    content: "";
    position: absolute;
    width: 100px; height: 100px;
    border: 2px solid var(--knight-gold);
    pointer-events: none;
  }
  .content::before { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
  .content::after { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }

  /* Pétales dorées massives */
  .osmanthus-v3 {
    position: fixed;
    width: 20px; height: 20px;
    background: var(--knight-gold);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    filter: blur(1px) drop-shadow(0 0 8px var(--knight-gold));
    z-index: 1;
    animation: divineRotate 10s infinite linear;
  }

  @keyframes divineRotate {
    0% { transform: translateY(-10vh) rotate(0deg) scale(0.5); opacity: 0; }
    50% { opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(720deg) scale(1.5); opacity: 0; }
  }
</style>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<script>
  (function() {
    // 1. On force le nettoyage complet
    const cleanup = () => {
      document.querySelectorAll('#theme-picker, .app-nav').forEach(el => el.remove());
    };
    cleanup(); setInterval(cleanup, 500);

    // 2. Spawn des pétales d'Alice
    const spawn = () => {
      const p = document.createElement('div');
      p.className = 'osmanthus-v3';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (Math.random() * 5 + 5) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 10000);
    };
    setInterval(spawn, 500);

    // 3. Effet de survol 3D sur la stèle
    const content = document.querySelector('.content');
    document.addEventListener('mousemove', (e) => {
      const x = (window.innerWidth / 2 - e.pageX) / 50;
      const y = (window.innerHeight / 2 - e.pageY) / 50;
      content.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
    });
  })();
</script>
