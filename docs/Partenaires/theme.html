<style>
  /* 1. ÉRADICATION DU FOND OSHI NO KO & RESET */
  :root, [data-theme] {
    --bg-main: #0a0b10 !important;
    --theme-color: #f1c40f !important;
  }

  /* On cache de force les éléments visuels par défaut du site */
  #stars-container, .star, .cursor-glow, .background-overlay, #loader-star {
    display: none !important;
    opacity: 0 !important;
    visibility: hidden !important;
  }

  /* 2. LE NOUVEAU FOND DIVIN (CATHÉDRALE DE L'AXIOME) */
  body {
    background: radial-gradient(circle at center, #1e2a4a 0%, #05070a 100%) !important;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('https://www.transparenttextures.com/patterns/graphy-dark.png');
    opacity: 0.2;
    z-index: -1;
  }

  /* 3. STRUCTURE : LES PANNEAUX DE CRISTAL */
  /* Sidebar style "Hologramme de l'Unité Centrale" */
  .sidebar {
    background: rgba(255, 255, 255, 0.02) !important;
    backdrop-filter: blur(25px) !important;
    border-right: 2px solid #f1c40f !important;
    box-shadow: 10px 0 50px rgba(0, 85, 255, 0.2) !important;
    color: #fff !important;
  }

  .sidebar-nav ul li a {
    color: rgba(255, 255, 255, 0.6) !important;
    font-family: 'Cinzel', serif; /* Police type épée/noble */
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(241, 196, 15, 0.1);
  }

  .sidebar-nav ul li.active > a {
    color: #f1c40f !important;
    text-shadow: 0 0 15px #f1c40f;
    background: linear-gradient(90deg, rgba(241, 196, 15, 0.1), transparent) !important;
  }

  /* Contenu principal comme un parchemin de lumière */
  .content {
    background: rgba(10, 15, 30, 0.7) !important;
    border: 1px solid rgba(241, 196, 15, 0.3) !important;
    box-shadow: 0 0 100px rgba(0, 0, 0, 1), inset 0 0 40px rgba(0, 85, 255, 0.1) !important;
    border-radius: 0 !important; /* On reste sur du tranchant/noble */
    margin-top: 50px !important;
  }

  /* 4. DESIGN DES TITRES : SYSTEM CALL */
  .markdown-section h1 {
    font-family: 'Cinzel', serif;
    text-align: center;
    color: #fff !important;
    text-shadow: 0 0 20px #f1c40f, 0 0 40px rgba(0, 85, 255, 0.5) !important;
    border: none !important;
    padding-bottom: 40px;
  }

  .markdown-section h1::before {
    content: "« SYSTEM CALL »";
    display: block;
    font-size: 0.3em;
    color: #00ddff;
    letter-spacing: 8px;
    margin-bottom: 10px;
  }

  /* 5. EFFET "RELEASE RECOLLECTION" (OSMANTHUS BLOSSOMS) */
  .petal {
    position: fixed;
    background: #f1c40f;
    width: 6px; height: 6px;
    border-radius: 100% 0 100% 0;
    z-index: 9999;
    pointer-events: none;
    box-shadow: 0 0 10px #f1c40f;
    animation: flow 7s infinite linear;
  }

  @keyframes flow {
    0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(110vh) rotate(1080deg) translateX(150px); opacity: 0; }
  }

  /* 6. BARRE DE NAVIGATION (RETOUR LOBBY) */
  .app-nav {
      background: rgba(0, 0, 0, 0.8) !important;
      border-bottom: 1px solid #f1c40f !important;
  }
</style>

<div id="divine-overlay"></div>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<script>
  (function() {
    console.log("⚔️ Integrity Knight Protocol v3.0 : TOTAL OVERWRITE");
    document.title = "UNITÉ DE L'INTÉGRITÉ // PARTENAIRES";

    // Création des pétales d'Osmanthus dorés
    const container = document.body;
    for(let i=0; i<15; i++) {
        setTimeout(() => {
            setInterval(() => {
                const p = document.createElement('div');
                p.className = 'petal';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 4 + 5) + 's';
                container.appendChild(p);
                setTimeout(() => p.remove(), 7000);
            }, 800);
        }, i * 200);
    }

    // On force le titre de la sidebar
    const sideTitle = document.querySelector('.sidebar h1 a');
    if(sideTitle) sideTitle.innerHTML = "AXIOM CHURCH";
  })();
</script>
