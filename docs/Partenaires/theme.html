<style>
  /* --- 1. ÉRADICATION TOTALE DU FOND ET DES ÉLÉMENTS OSHI/MEMCHO --- */
  :root, [data-theme], html, body, main {
    background: transparent !important;
    background-image: none !important;
  }

  /* Cacher absolutely TOUT ce qui appartient au site de base et qui pourrait dépasser */
  #theme-picker, #stars-container, .star, .cursor-glow, .background-overlay, 
  .fx-star, .fx-heart, #fx-container, .fx-orb {
    display: none !important;
    opacity: 0 !important;
    visibility: hidden !important;
  }

  /* --- 2. LE NOUVEAU FOND SANS BUG (UNDERWORLD DIVIN) --- */
  /* On applique le fond divin sur l'élément html directement */
  html {
    background: radial-gradient(circle at center, #002244 0%, #020408 100%) !important;
  }

  /* --- 3. RESTRUCTURATION DE LA STÈLE (CORRECTION DU BUG) --- */
  /* La carte de contenu (La Stèle) */
  .content {
    position: fixed !important; /* Reste fixe par rapport à la vue */
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) !important; /* Recentrage parfait */
    width: 850px !important;
    height: 80vh !important;
    max-height: 800px !important;
    margin: 0 !important;
    background: rgba(255, 255, 255, 0.03) !important;
    backdrop-filter: blur(30px) !important;
    border: 1px solid rgba(241, 196, 15, 0.4) !important;
    box-shadow: 0 0 100px rgba(0, 0, 0, 1), 
                inset 0 0 50px rgba(0, 136, 255, 0.1) !important;
    overflow-y: auto !important; /* Le scroll est ICI maintenant */
    padding: 60px !important;
    z-index: 5 !important;
    border-radius: 4px !important;
  }

  /* --- 4. LA SIDEBAR VR FLOTTANTE (CORRIGÉE ET DÉPLACÉE) --- */
  /* La sidebar devient un panneau VR flottant à droite de la stèle */
  .sidebar {
    position: fixed !important;
    left: auto !important;
    right: 5% !important; /* Reste sur la droite */
    width: 280px !important;
    height: auto !important;
    top: 50% !important;
    transform: translateY(-50%) rotateY(-15deg) !important; /* Effet VR 3D */
    background: transparent !important;
    border: none !important;
    z-index: 10 !important;
    padding-bottom: 0 !important;
  }

  /* Les items de la sidebar VR */
  .sidebar-nav ul li {
    background: rgba(0, 0, 0, 0.6) !important;
    border: 1px solid #f1c40f !important;
    margin-bottom: 10px !important;
    padding: 10px !important;
    clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%) !important;
    transition: 0.3s ease;
  }

  .sidebar-nav ul li a {
    color: #f1c40f !important;
    font-family: 'Cinzel', serif !important;
    text-decoration: none !important;
    text-align: center;
    font-weight: bold;
    letter-spacing: 1px;
    padding: 0 !important;
  }

  .sidebar-nav ul li.active > a, .sidebar-nav ul li:hover a {
    color: #000 !important;
    text-shadow: none !important;
  }
  
  .sidebar-nav ul li:hover, .sidebar-nav ul li.active {
    background: #f1c40f !important;
    transform: translateX(-10px);
  }

  /* Cache le titre et le logo de la sidebar par défaut */
  .sidebar h1, .sidebar-resizer, .app-nav {
      display: none !important;
  }

  /* --- 5. TEXTE ET EFFETS --- */
  .markdown-section h1 {
    font-family: 'Cinzel', serif !important;
    text-shadow: 0 0 20px #f1c40f, 0 0 40px rgba(0, 136, 255, 0.5) !important;
    color: #fff !important;
    text-align: center;
    border: none !important;
    padding-bottom: 40px;
    margin-top: 0 !important;
  }

  /* Le badge Premium */
  .markdown-section p img[src*="badge"] {
      filter: drop-shadow(0 0 10px #f1c40f);
  }

  /* --- 6. PARTICULES DORÉES MASSIVES --- */
  .divine-particle {
    position: fixed;
    width: 15px; height: 15px;
    background: #f1c40f;
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    filter: blur(1px) drop-shadow(0 0 8px #f1c40f);
    z-index: 1 !important;
    animation: flowDivinity 10s infinite linear;
  }

  @keyframes flowDivinity {
    0% { transform: translateY(-10vh) rotate(0deg) scale(0.5); opacity: 0; }
    50% { opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(720deg) scale(1.5); opacity: 0; }
  }
</style>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<script>
  (function() {
    console.log("⚔️ Integrity Protocol v4.0: UNIFIED AXIOM STRUCTURE (Fix Background Bug)");
    document.title = "AXIS MUNDI // UNITÉ DE L'INTÉGRITÉ";

    // 1. On force le nettoyage complet
    const cleanup = () => {
      document.querySelectorAll('#theme-picker, .app-nav, .search').forEach(el => el.remove());
    };
    cleanup(); setInterval(cleanup, 500);

    // 2. Spawn des pétales d'Alice (Plus grands et plus massifs)
    const spawnPetal = () => {
      const p = document.createElement('div');
      p.className = 'divine-particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (Math.random() * 3 + 6) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 10000);
    };
    setInterval(spawnPetal, 400);

    // 3. Effet de survol 3D sur la stèle (Le menu suit le curseur)
    const stela = document.querySelector('.content');
    document.addEventListener('mousemove', (e) => {
      const x = (window.innerWidth / 2 - e.pageX) / 100;
      const y = (window.innerHeight / 2 - e.pageY) / 100;
      stela.style.transform = `translate(-50%, -50%) rotateY(${x}deg) rotateX(${y}deg)`;
    });
  })();
</script>
