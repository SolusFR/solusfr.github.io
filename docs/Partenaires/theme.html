<style>
  /* --- 1. PURGE DES BUGS VISUELS (RÉF : TES CAPTURES) --- */
  html, body, main, section.content {
    background: #0f0905 !important; /* Fond terre brûlée/Mordor */
    overflow: hidden !important;
    height: 100vh !important;
  }

  /* On supprime la barre grise en bas à gauche et le sélecteur rose */
  .sidebar-toggle, #theme-picker, .app-nav, .search, #stars-container {
    display: none !important;
  }

  /* --- 2. LA SIDEBAR : PARCHEMIN ANCIEN --- */
  .sidebar {
    position: fixed !important;
    left: 20px !important;
    top: 50% !important;
    transform: translateY(-50%) !important;
    width: 300px !important;
    height: 80vh !important;
    background: #e3d5b8 !important; /* Couleur papier vieilli */
    background-image: url('https://www.transparenttextures.com/patterns/paper.png') !important;
    border: 15px solid transparent !important;
    /* Bordure style fer forgé / Nanster */
    border-image: url('https://i.imgur.com/8S9S8pX.png') 30 stretch !important; 
    box-shadow: 20px 0 50px rgba(0,0,0,0.7), inset 0 0 100px rgba(139, 69, 19, 0.2) !important;
    z-index: 1000 !important;
    border-radius: 5px !important;
  }

  /* Titre "DOCS" style Inscription de l'Anneau */
  .sidebar h1 {
    font-family: 'Papyrus', 'Palatino', serif !important;
    color: #4b2c20 !important;
    text-transform: uppercase !important;
    letter-spacing: 5px !important;
    border-bottom: 2px solid #8b4513 !important;
    margin-bottom: 20px !important;
  }

  /* Liens du menu (Minecraft, Sécurité...) */
  .sidebar-nav ul li a {
    color: #4b2c20 !important;
    font-family: 'Crimson Text', serif !important;
    font-size: 1.3em !important;
    font-style: italic !important;
    transition: 0.3s !important;
    padding: 10px !important;
    display: block !important;
    border: none !important;
  }

  .sidebar-nav ul li a:hover, .sidebar-nav ul li.active > a {
    color: #d4af37 !important; /* Or de l'Anneau */
    text-shadow: 0 0 5px rgba(212, 175, 55, 0.5) !important;
    background: rgba(139, 69, 19, 0.1) !important;
    transform: translateX(10px) rotate(-1deg) !important;
  }

  /* --- 3. LE CONTENU : STÈLE DE GONDOR --- */
  .content {
    position: fixed !important;
    left: 360px !important;
    right: 40px !important;
    top: 50px !important;
    bottom: 50px !important;
    width: auto !important;
    height: auto !important;
    background: #fdfbf7 !important;
    border: 1px solid #d4af37 !important;
    padding: 60px !important;
    overflow-y: auto !important;
    box-shadow: 0 0 30px rgba(0,0,0,0.5) !important;
  }

  /* Titres style Eldamar */
  .markdown-section h1 {
    font-family: 'Cinzel', serif !important;
    color: #2c3e50 !important;
    text-align: center !important;
    border-bottom: 2px solid #d4af37 !important;
  }

  /* --- 4. EFFET DE PARTICULES : CENDRES DU MORDOR --- */
  .ash {
    position: fixed;
    background: rgba(255, 255, 255, 0.2);
    width: 2px; height: 2px;
    pointer-events: none;
    z-index: 1;
    animation: drift linear infinite;
  }

  @keyframes drift {
    from { transform: translateY(-10vh) translateX(0); opacity: 1; }
    to { transform: translateY(110vh) translateX(100px); opacity: 0; }
  }
</style>

<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@1,600&family=Cinzel:wght@700&display=swap" rel="stylesheet">

<script>
  (function() {
    // Nettoyage des résidus visibles sur tes images
    const cleanLOTR = () => {
      document.querySelectorAll('.sidebar-toggle, #theme-picker, .app-nav').forEach(el => el.remove());
    };
    cleanLOTR(); setInterval(cleanLOTR, 500);

    // Ajout de cendres flottantes (Ambiance Mount Doom)
    for(let i=0; i<30; i++) {
      const ash = document.createElement('div');
      ash.className = 'ash';
      ash.style.left = Math.random() * 100 + 'vw';
      ash.style.animationDuration = (Math.random() * 5 + 5) + 's';
      ash.style.delay = Math.random() * 5 + 's';
      document.body.appendChild(ash);
    }
  })();
</script>
