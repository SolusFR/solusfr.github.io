<style>
  :root {
    --bg-color: #03060b;
    --text-color: #e3f2fd;
    --heading-color: #ffd700;
    --accent-color: #00e5ff;
    --gold-border: #d4af37;
    --panel-bg: rgba(5, 15, 30, 0.85);
  }

  /* 1. RESET COMPLET DE LA STRUCTURE DOCSIFY */
  
  body {
    background-color: var(--bg-color) !important;
    overflow-x: hidden;
  }

  /* On transforme la Sidebar en Panneau Flottant (Aile gauche) */
  .sidebar {
    position: fixed !important;
    top: 25px !important;
    left: 20px !important;
    height: calc(100vh - 50px) !important;
    width: 280px !important;
    background: var(--panel-bg) !important;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid var(--gold-border) !important;
    border-radius: 0 !important;
    z-index: 100;
    /* Forme biseautée unique (Style UI SAO) */
    clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 80% 100%, 0% 100%);
    box-shadow: 0 0 30px rgba(0, 229, 255, 0.2) !important;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  /* On transforme le Contenu en Plaque de Cristal (Bouclier droit) */
  .content {
    position: static !important;
    margin-left: 330px !important; /* Espace pour la sidebar + marge */
    padding-top: 25px !important;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    background: transparent !important;
  }

  .markdown-section {
    max-width: 900px !important;
    width: 90% !important;
    margin: 0 !important;
    background: var(--panel-bg) !important;
    padding: 50px !important;
    border: 1px solid rgba(212, 175, 55, 0.3) !important;
    backdrop-filter: blur(10px);
    /* Forme hexagonale étirée */
    clip-path: polygon(5% 0%, 95% 0%, 100% 5%, 100% 95%, 95% 100%, 5% 100%, 0% 95%, 0% 5%);
    box-shadow: 0 10px 50px rgba(0,0,0,0.8);
    position: relative;
  }

  /* 2. ÉLÉMENTS DÉCORATIFS (OR ET BLEU) */

  /* Coins dorés sur le panneau principal */
  .markdown-section::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    border: 2px solid var(--gold-border);
    clip-path: polygon(0 0, 15% 0, 0 15%, 85% 100%, 100% 100%, 100% 85%);
    pointer-events: none;
    opacity: 0.5;
  }

  /* Titre Solus Wiki dans la sidebar */
  .sidebar > h1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 900 !important;
    text-shadow: 0 0 10px var(--heading-color) !important;
    letter-spacing: 2px;
    margin-top: 30px !important;
    border-bottom: 2px solid var(--gold-border) !important;
  }

  /* Liens de la sidebar */
  .sidebar-nav ul li a {
    color: #b0bec5 !important;
    border-left: 3px solid transparent !important;
    padding: 12px 20px !important;
    margin: 5px 10px !important;
    background: rgba(255, 255, 255, 0.02);
  }

  .sidebar-nav ul li.active > a {
    background: linear-gradient(90deg, rgba(212, 175, 55, 0.3), transparent) !important;
    color: #fff !important;
    border-left: 3px solid var(--heading-color) !important;
    box-shadow: none !important;
  }

  /* 3. EFFETS DE FOND (SACRED ARTS) */

  .animated-background {
    background: radial-gradient(circle at 70% 30%, #0a1e3d 0%, #03060b 100%) !important;
  }
  .animated-background::before, .animated-background::after { display: none !important; }

  /* Cercle de Sacred Art qui tourne derrière le contenu */
  .sacred-circle {
    position: fixed;
    bottom: -150px;
    right: -150px;
    width: 600px;
    height: 600px;
    border: 2px solid rgba(0, 229, 255, 0.1);
    border-radius: 50%;
    z-index: -1;
    animation: rotate-sacred 20s linear infinite;
  }
  .sacred-circle::after {
    content: "SYSTEM CALL • GENERATE ELEMENT • CRYSTAL •";
    position: absolute;
    top: 10px; left: 10px; right: 10px; bottom: 10px;
    border: 1px dashed rgba(212, 175, 55, 0.2);
    border-radius: 50%;
    color: rgba(0, 229, 255, 0.2);
    font-size: 10px;
    text-align: center;
    line-height: 580px;
    letter-spacing: 5px;
  }

  @keyframes rotate-sacred {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* 4. FIX MARKDOWN (PAS DE ROUGE) */
  
  .markdown-section h1 {
    color: var(--heading-color) !important;
    text-shadow: 0 0 15px rgba(212, 175, 55, 0.5) !important;
    text-align: center;
  }

  .markdown-section h2 {
    border-bottom: 1px solid var(--gold-border) !important;
    color: #fff !important;
  }

  .markdown-section hr {
    background: linear-gradient(90deg, transparent, var(--gold-border), transparent) !important;
    height: 1px !important;
    border: none !important;
  }

  .markdown-section code {
    background: rgba(0, 229, 255, 0.1) !important;
    color: var(--accent-color) !important;
    border: 1px solid var(--accent-color) !important;
  }

  .markdown-section table {
    border: 1px solid var(--gold-border) !important;
  }
  .markdown-section table th {
    background: rgba(212, 175, 55, 0.2) !important;
    color: var(--heading-color) !important;
  }

  /* 5. MOBILE FIX */
  @media screen and (max-width: 1000px) {
    .sidebar {
      left: -300px !important; /* Masquée par défaut sur petit écran */
    }
    body:not(.close) .sidebar {
      left: 0 !important;
      width: 280px !important;
      clip-path: none !important;
    }
    .content {
      margin-left: 0 !important;
    }
    .markdown-section {
      width: 95% !important;
      padding: 30px 15px !important;
      clip-path: none !important;
    }
  }

  /* Fix couleur de la barre de recherche */
  .sidebar .search input {
    color: var(--accent-color) !important;
    border: 1px solid var(--gold-border) !important;
    background: rgba(0,0,0,0.5) !important;
  }
  /* --- FIX HOVER & GLOW (ANTI-BORDEAUX FORCE) --- */

  /* 1. Fix des titres Markdown au survol (ton image 1) */
  .markdown-section h1:hover, 
  .markdown-section h2:hover, 
  .markdown-section h3:hover {
    text-shadow: 0 0 15px rgba(212, 175, 55, 0.8) !important; /* Glow Or */
    color: var(--heading-color) !important;
  }

  /* Si tes titres ont des bordures/soulignages au survol */
  .markdown-section h2::after {
    background: linear-gradient(90deg, var(--gold-border), transparent) !important;
  }

  /* 2. Fix du menu latéral au survol (ton image 2) */
  .sidebar-nav ul li a:hover {
    background-color: rgba(212, 175, 55, 0.15) !important; /* Fond Or très léger */
    color: #fff !important;
    text-shadow: 0 0 10px var(--heading-color) !important;
    box-shadow: inset 4px 0 0 var(--heading-color) !important; /* Ligne à gauche */
    transform: translateX(5px) !important;
  }

  /* 3. Fix du fond des blocs (ton image 2 - le rectangle sombre) */
  /* Si c'est un lien ou un code qui devient rouge sombre */
  .markdown-section code, 
  .markdown-section a {
    background-color: rgba(0, 229, 255, 0.05) !important;
  }
  
  .markdown-section a:hover {
    background-color: rgba(212, 175, 55, 0.2) !important; /* Fond Or au survol des liens */
    color: #fff !important;
    border-bottom: 1px solid var(--heading-color) !important;
  }

  /* 4. Suppression de l'ombre rose sur le titre principal de la sidebar */
  .sidebar > h1:hover {
    text-shadow: 0 0 20px var(--heading-color) !important;
  }

  /* 5. Fix des boutons de copie de code (si présents) */
  .docsify-copy-code-button {
    background: var(--panel-bg) !important;
    color: var(--gold-border) !important;
    border: 1px solid var(--gold-border) !important;
  }
  .docsify-copy-code-button:hover {
    background: var(--gold-border) !important;
    color: #000 !important;
  }
  /* --- DESTRUCTION RADICALE DU GLOW ROUGE SUR LES TITRES --- */

  /* 1. On réinitialise TOUS les titres et leurs ombres */
  .markdown-section h1, 
  .markdown-section h2, 
  .markdown-section h3, 
  .markdown-section h4, 
  .markdown-section h5, 
  .markdown-section h6 {
    /* On force une ombre Or/Bleu et on écrase l'ancienne */
    text-shadow: 0 0 12px rgba(212, 175, 55, 0.4) !important; 
    color: var(--heading-color) !important;
  }

  /* 2. FIX DE L'ICÔNE AVANT LE TITRE (L'étoile ✨ qui brille en rouge) */
  .markdown-section h2::before {
    content: "⚔️ " !important; /* On change l'étoile par une épée pour SAO */
    color: var(--heading-color) !important;
    /* On tue le glow jaune/rouge de l'étoile originale */
    text-shadow: 0 0 10px rgba(212, 175, 55, 0.8) !important; 
  }

  /* 3. FIX DU SOULIGNAGE (La ligne rouge sous les titres) */
  .markdown-section h2 {
    border-bottom: 2px solid var(--gold-border) !important;
    box-shadow: 0 4px 10px -5px rgba(212, 175, 55, 0.3) !important; /* Lueur sous la ligne */
  }

  /* 4. SÉCURITÉ AU SURVOL (Hover) */
  .markdown-section h1:hover, 
  .markdown-section h2:hover, 
  .markdown-section h3:hover {
    text-shadow: 0 0 20px var(--heading-color) !important;
    color: #fff !important;
  }

  /* 5. FIX DES MOTS EN GRAS (Strong) qui pourraient avoir gardé un glow */
  .markdown-section strong {
    color: #fff !important;
    text-shadow: 0 0 8px rgba(0, 229, 255, 0.4) !important; /* Glow Azur pour le gras */
  }

  /* 6. FIX DES LIENS (L'ombre portée des liens) */
  .markdown-section a {
    text-shadow: none !important;
    box-shadow: none !important;
  }
</style>

<!-- HTML SUPPLEMENTAIRE -->
<div class="sacred-circle"></div>
<!-- Ligne de scan "System Call" -->
<div style="position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--accent-color), transparent); opacity: 0.3; z-index: 1000; animation: scanline 4s linear infinite;"></div>

<style>
@keyframes scanline {
  0% { top: 0; }
  100% { top: 100vh; }
}
</style>
