<style>
  /* --- 1. ÉRADICATION DES BUGS VISUELS --- */
  html, body {
    background: #050708 !important; /* Noir profond */
    overflow: hidden !important;
    height: 100vh !important;
  }

  /* Nettoyage de la barre grise en bas et du sélecteur rose vus sur les captures */
  .sidebar-toggle, #theme-picker, .app-nav, .search, #stars-container, #fx-container {
    display: none !important;
    opacity: 0 !important;
  }

  /* --- 2. LA STÈLE DE MINAS MORGUL (CONTENU) --- */
  .content {
    background: rgba(10, 15, 12, 0.95) !important; /* Vert très sombre spectral */
    border: 1px solid #2d4c3b !important; /* Acier vert corrompu */
    box-shadow: 0 0 60px rgba(0, 255, 100, 0.05), inset 0 0 40px rgba(0, 0, 0, 1) !important;
    margin: 40px auto !important;
    max-width: 950px !important;
    min-height: 85vh !important;
    position: relative !important;
    z-index: 10 !important;
    overflow-y: auto !important;
    border-radius: 0px !important;
  }

  /* --- 3. LISIBILITÉ TOTALE (FIX POUR TES CAPTURES) --- */
  .markdown-section {
    color: #a3b1a9 !important; /* Gris acier clair pour une lecture parfaite sur fond noir */
    font-family: 'Cinzel', serif !important;
    line-height: 1.7 !important;
    padding: 60px !important;
  }

  /* Titres Spectraux */
  .markdown-section h1, .markdown-section h2 {
    color: #00ffaa !important; /* Vert Morgul */
    text-shadow: 0 0 15px rgba(0, 255, 170, 0.4) !important;
    text-transform: uppercase !important;
    letter-spacing: 3px !important;
    border-bottom: 1px solid #1a3a2a !important;
  }

  /* --- 4. LA SIDEBAR : LES NEUF CAVALIERS --- */
  .sidebar {
    background: #080a0c !important;
    border-right: 2px solid #1a3a2a !important;
    box-shadow: 10px 0 30px rgba(0,0,0,0.9) !important;
    z-index: 100 !important;
  }

  .sidebar h1 a {
    font-family: 'Cinzel', serif !important;
    color: #00ffaa !important;
    text-shadow: 0 0 10px #00ffaa !important;
    letter-spacing: 2px !important;
  }

  /* Liens du menu (Minecraft, Sécurité...) */
  .sidebar-nav ul li a {
    color: #667c71 !important; /* Gris-vert fantomatique */
    font-weight: 400 !important;
    font-size: 1.1em !important;
    transition: 0.4s !important;
  }

  /* Effet de sélection Nazgûl */
  .sidebar-nav ul li.active > a, .sidebar-nav ul li a:hover {
    color: #ffffff !important;
    background: linear-gradient(90deg, rgba(0, 255, 170, 0.1), transparent) !important;
    border-left: 3px solid #00ffaa !important;
    text-shadow: 0 0 8px #fff !important;
  }

  /* --- 5. EFFET VISUEL : BRUME SPECTRALE --- */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 50%, rgba(0, 255, 170, 0.05) 0%, transparent 80%);
    pointer-events: none;
    z-index: 1;
  }
</style>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<script>
  (function() {
    // Force la suppression des éléments polluants des captures
    const purgeMorgul = () => {
        document.querySelectorAll('.sidebar-toggle, #theme-picker, .app-nav').forEach(el => el.remove());
        
        // On change le titre pour le thème Nazgûl
        const title = document.querySelector('.sidebar h1 a');
        if(title) title.innerText = "◈ MINAS MORGUL";
    };

    purgeMorgul();
    setInterval(purgeMorgul, 1000);
  })();
</script>
