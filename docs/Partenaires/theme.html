<style>
  /* --- 1. ÉLIMINATION RADICALE DU ROSE --- */
  :root {
    --theme-color: #00ffaa !important;
  }

  /* On tue le glow rose et les ombres des blocs markdown vus sur tes images */
  .markdown-section p, .markdown-section code, .markdown-section pre, 
  .markdown-section blockquote, .markdown-section img, .content {
    box-shadow: 0 0 20px rgba(0, 255, 170, 0.1) !important; /* Glow vert discret */
    border-color: #1a3a2a !important;
  }

  /* Force le remplacement des textes roses résiduels */
  .markdown-section strong, .markdown-section b, .markdown-section em, .markdown-section a {
    color: #00ffaa !important;
    text-shadow: 0 0 5px rgba(0, 255, 170, 0.5) !important;
    text-decoration: none !important;
  }

  /* --- 2. TRANSFORMATION DE LA SIDEBAR (ZÉRO GLOW ROSE) --- */
  .sidebar {
    background: #050708 !important;
    border: none !important;
    /* On remplace le glow rose par un halo d'acier noir */
    box-shadow: 15px 0 35px rgba(0, 0, 0, 0.9) !important; 
    clip-path: polygon(0 0, 100% 0, 100% 92%, 75% 100%, 0 100%) !important;
  }

  /* L'effet glow de sélection passe au vert spectral */
  .sidebar-nav li.active > a, .sidebar-nav li a:hover {
    background: linear-gradient(90deg, rgba(0, 255, 170, 0.15) 0%, transparent 100%) !important;
    box-shadow: -5px 0 15px rgba(0, 255, 170, 0.3) !important;
    color: #fff !important;
    border: none !important;
  }

  /* --- 3. FORME DU SITE : FRAGMENT D'ARMURE --- */
  html, body { background: #010203 !important; overflow: hidden !important; }

  .content {
    background: #080a0c !important;
    border-top: 2px solid #00ffaa !important;
    clip-path: polygon(3% 0, 100% 0, 100% 100%, 0 100%, 0 6%) !important;
    margin-top: 10px !important;
    padding: 60px !important;
  }

  /* --- 4. LISIBILITÉ D'ACIER --- */
  .markdown-section {
    color: #e2e8f0 !important; /* Gris blanc tranchant pour tes captures */
    font-family: 'Cinzel', serif !important;
  }

  .markdown-section h1, .markdown-section h2 {
    color: #00ffaa !important;
    text-shadow: 0 0 12px rgba(0, 255, 170, 0.4) !important;
    border-bottom: 1px double #1a3a2a !important;
  }

  /* Purge des boutons de menu et étoiles roses vus sur tes captures */
  .sidebar-toggle, #theme-picker, .app-nav, #stars-container, .star {
    display: none !important;
  }
</style>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<script>
  (function() {
    const morgulPurge = () => {
      // 1. On scanne tous les éléments pour supprimer le style "pink" ou "rose" injecté
      document.querySelectorAll('*').forEach(el => {
        const style = window.getComputedStyle(el);
        // Si l'ombre est rose/rouge (vu sur image_73f443.jpg)
        if (style.boxShadow.includes('255,') || style.boxShadow.includes('rgb(')) {
           if (!style.boxShadow.includes('0, 255, 170')) {
             el.style.setProperty('box-shadow', 'none', 'important');
           }
        }
      });

      // 2. On vire la barre de menu grise en bas
      const toggle = document.querySelector('.sidebar-toggle');
      if(toggle) toggle.remove();
    };

    morgulPurge();
    setInterval(morgulPurge, 400);

    // Titre de la Sidebar
    const title = document.querySelector('.sidebar h1 a');
    if(title) title.innerHTML = "◈ SPECTRE // SOLUS";
  })();
</script>
