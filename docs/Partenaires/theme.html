<style>
  /* --- 1. RÉACTIVATION DU SCROLL (FIX BLOQUAGE) --- */
  html, body {
    background: #020405 !important;
    margin: 0 !important;
    padding: 0 !important;
    height: 100% !important;
    overflow: hidden !important; /* Le body reste fixe */
  }

  /* On force le scroll UNIQUEMENT ici pour que tu puisses lire tes docs */
  .content {
    position: absolute !important;
    left: 320px !important;
    right: 20px !important;
    top: 20px !important;
    bottom: 20px !important;
    overflow-y: auto !important; /* RÉACTIVE LE DÉFILEMENT ICI */
    -webkit-overflow-scrolling: touch;
    background: #080a0c !important;
    border-left: 3px solid #00ffaa !important;
    clip-path: polygon(3% 0, 100% 0, 100% 100%, 0 100%, 0 6%) !important;
    padding: 60px !important;
    z-index: 5 !important;
  }

  /* --- 2. NETTOYAGE RADICAL DU ROSE (SEARCH & GLOW) --- */
  /* Force le Search en vert spectral */
  .search input {
    background: rgba(0, 255, 170, 0.05) !important;
    border: 1px solid #1a3a2a !important;
    color: #00ffaa !important;
  }

  /* Écrase le glow rose de la sidebar vu sur tes images */
  .sidebar {
    background: #050708 !important;
    box-shadow: 15px 0 35px rgba(0, 0, 0, 0.9), 5px 0 15px rgba(0, 255, 170, 0.1) !important;
    border: none !important;
    z-index: 10 !important;
  }

  /* Supprime les résidus de l'image de fond et des étoiles roses */
  #stars-container, .star, #theme-picker, .sidebar-toggle {
    display: none !important;
    visibility: hidden !important;
  }

  /* --- 3. LISIBILITÉ SPECTRE (FIX IMAGE_73E959) --- */
  .markdown-section {
    color: #d1d5db !important;
    font-family: 'Cinzel', serif !important;
  }

  .markdown-section h1, .markdown-section h2 {
    color: #00ffaa !important;
    text-shadow: 0 0 15px rgba(0, 255, 170, 0.4) !important;
  }

  /* Remplacement des puces roses par des dagues d'acier */
  .markdown-section ul li::before {
    color: #00ffaa !important;
    content: "🗡" !important;
  }

  /* --- 4. BARRE DE SCROLL STYLE MINAS MORGUL --- */
  .content::-webkit-scrollbar { width: 6px; }
  .content::-webkit-scrollbar-track { background: #020405; }
  .content::-webkit-scrollbar-thumb { 
    background: #1a3a2a; 
    border-radius: 10px;
    box-shadow: 0 0 10px #00ffaa;
  }
</style>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<script>
  (function() {
    const finalExorcism = () => {
      // 1. On traque toute injection de style rose (Search, Glow, etc)
      document.querySelectorAll('*').forEach(el => {
        const style = window.getComputedStyle(el);
        // Détecte le rose/magenta par ses valeurs RGB
        if (style.color.includes('255, 51') || style.boxShadow.includes('255, 51')) {
          el.style.setProperty('color', '#00ffaa', 'important');
          el.style.setProperty('box-shadow', '0 0 10px rgba(0, 255, 170, 0.3)', 'important');
        }
      });

      // 2. Supprime la barre de menu mobile grise
      const bugBar = document.querySelector('.sidebar-toggle');
      if(bugBar) bugBar.remove();
    };

    finalExorcism();
    setInterval(finalExorcism, 500);

    // Force le focus scroll sur le bon élément
    window.addEventListener('load', () => {
      const content = document.querySelector('.content');
      if(content) content.focus();
    });
  })();
</script>
