<style>
  /* --- 1. L'ANNIHILATEUR DE BUGS --- */
  /* On force le fond à être noir absolu pour ne plus voir les décalages de Docsify */
  html, body {
    background: #020408 !important;
    overflow: hidden !important; /* Interdit le scroll du site de base */
    height: 100% !important;
  }

  /* On fait disparaître tout le "bruit" de Docsify (boutons, barres, menus mobiles) */
  #theme-picker, .sidebar-toggle, .app-nav, .search, #stars-container, 
  #fx-container, .github-corner, .app-sub-sidebar {
    display: none !important;
    visibility: hidden !important;
  }

  /* --- 2. LA STRUCTURE "INTEGRITY KNIGHT" --- */
  /* Le panneau central (Stèle d'Or) */
  .content {
    position: fixed !important;
    top: 50% !important;
    left: 45% !important;
    transform: translate(-50%, -50%) !important;
    width: 60vw !important;
    height: 80vh !important;
    background: rgba(5, 10, 20, 0.9) !important;
    backdrop-filter: blur(20px) !important;
    border: 1px solid #f1c40f !important;
    box-shadow: 0 0 50px rgba(0, 0, 0, 1), 0 0 20px rgba(241, 196, 15, 0.2) !important;
    z-index: 9999 !important;
    overflow-y: auto !important; /* Le scroll ne se fait qu'ici */
    padding: 60px !important;
    border-radius: 2px !important;
  }

  /* La Sidebar (Menu Flottant) */
  .sidebar {
    position: fixed !important;
    left: auto !important;
    right: 5% !important;
    top: 50% !important;
    transform: translateY(-50%) !important;
    width: 250px !important;
    background: transparent !important;
    border: none !important;
    z-index: 10000 !important;
    display: block !important;
  }

  /* Transformation des liens en boutons SAO */
  .sidebar-nav ul li {
    background: linear-gradient(90deg, rgba(0, 136, 255, 0.1), transparent) !important;
    border: 1px solid rgba(241, 196, 15, 0.5) !important;
    margin-bottom: 12px !important;
    padding: 15px !important;
    clip-path: polygon(0% 0%, 90% 0%, 100% 50%, 90% 100%, 0% 100%) !important;
    transition: 0.3s ease !important;
    list-style: none !important;
  }

  .sidebar-nav ul li a {
    color: #f1c40f !important;
    font-family: 'Cinzel', serif !important;
    text-transform: uppercase !important;
    font-size: 0.9em !important;
    text-decoration: none !important;
    letter-spacing: 2px !important;
  }

  .sidebar-nav ul li:hover, .sidebar-nav ul li.active {
    background: #f1c40f !important;
    transform: scale(1.05) !important;
  }

  .sidebar-nav ul li:hover a, .sidebar-nav ul li.active a {
    color: #000 !important;
  }

  /* --- 3. DÉCORATIONS DIVINES --- */
  .markdown-section h1 {
    font-family: 'Cinzel', serif !important;
    color: #fff !important;
    text-shadow: 0 0 15px #f1c40f !important;
    text-align: center !important;
    border-bottom: 2px solid #f1c40f !important;
    padding-bottom: 20px !important;
  }

  /* Particules d'Osmanthus */
  .divine-petal {
    position: fixed;
    width: 10px; height: 10px;
    background: #f1c40f;
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    z-index: 999;
    pointer-events: none;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }
</style>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<script>
  (function() {
    // Force la suppression des résidus de Docsify
    const forceCleanup = () => {
      document.querySelectorAll('.sidebar-toggle, #theme-picker, .app-nav').forEach(el => {
        el.style.display = 'none';
        el.style.opacity = '0';
      });
    };
    setInterval(forceCleanup, 100);

    // Pétales d'Alice
    setInterval(() => {
      const p = document.createElement('div');
      p.className = 'divine-petal';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (Math.random() * 3 + 4) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 7000);
    }, 400);

    console.log("🛡️ Integrity Mode: Protocol Axiom-10 loaded.");
  })();
</script>
