<style>
  /* 1. RÉINITIALISATION TOTALE DE LA STRUCTURE */
  :root {
    --gold: #f1c40f;
    --divine-white: #f0f4f8;
    --royal-blue: #0055ff;
    --theme-color: var(--gold) !important;
  }

  body {
    background: #050505 url('https://www.transparenttextures.com/patterns/dark-matter.png') !important;
    display: flex;
    justify-content: center;
  }

  /* 2. DÉTACHEMENT ET FLOTTEMENT DE LA SIDEBAR */
  .sidebar {
    left: 20px !important;
    top: 20px !important;
    height: calc(100vh - 40px) !important;
    width: 280px !important;
    border-radius: 20px !important;
    background: rgba(255, 255, 255, 0.05) !important;
    backdrop-filter: blur(20px) !important;
    border: 1px solid rgba(241, 196, 15, 0.3) !important;
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(241, 196, 15, 0.1) !important;
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
  }

  /* 3. LE CONTENU DEVIENT UNE "CARTE FLOTTANTE" CENTRÉE */
  .content {
    left: 320px !important; /* On décolle de la sidebar */
    right: 40px !important;
    top: 40px !important;
    width: auto !important;
    position: absolute !important;
    background: rgba(255, 255, 255, 0.03) !important;
    border-radius: 30px !important;
    border: 1px solid rgba(255, 255, 255, 0.1) !important;
    padding: 20px !important;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8) !important;
  }

  section.content {
      padding-top: 0 !important;
  }

  /* 4. DESIGN DES TITRES (STYLE STÈLE SACRÉE) */
  .markdown-section h1 {
    text-align: center;
    font-family: 'Playfair Display', serif;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    background-size: 100% 2px;
    background-repeat: no-repeat;
    background-position: bottom;
    padding-bottom: 20px;
    color: #fff !important;
    text-shadow: 0 0 20px var(--gold);
  }

  /* 5. MASQUAGE DES ÉLÉMENTS INUTILES */
  #theme-picker, .sidebar-nav li.collapse > a::before {
    display: none !important;
  }

  /* 6. EFFET DE PARTICULES "FLOWERS" (OSMANTHUS) */
  .osmanthus {
    position: fixed;
    width: 8px;
    height: 8px;
    background: var(--gold);
    border-radius: 50% 0 50% 0;
    pointer-events: none;
    z-index: 10000;
    filter: blur(1px);
    animation: fall-complex 6s linear infinite;
  }

  @keyframes fall-complex {
    0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(100px); opacity: 0; }
  }

  /* Bouton de copie divin */
  .docsify-copy-code-button {
      background: var(--gold) !important;
      color: #000 !important;
      font-weight: bold !important;
      border-radius: 50px !important;
      transform: translateY(-10px);
  }
</style>

<div id="divine-aura"></div>

<script>
  (function() {
    console.log("⚔️ INTEGRITY KNIGHT MODE ACTIVATED");
    
    // Générateur de pétales
    const createPetal = () => {
      const p = document.createElement('div');
      p.className = 'osmanthus';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (Math.random() * 3 + 4) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 6000);
    };
    setInterval(createPetal, 200);

    // Modification du Loader pour ce dossier
    const loader = document.getElementById('loading-screen');
    if(loader) {
        loader.style.background = "radial-gradient(circle, #1a1a1a 0%, #000 100%)";
        const txt = loader.querySelector('.loader-text');
        if(txt) txt.innerHTML = "APPEL DU SYSTÈME : UNITÉ DE L'AXIOME...";
    }
  })();
</script>
