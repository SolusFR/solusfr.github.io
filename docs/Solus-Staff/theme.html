<style>
  /* 1. OVERRIDE COMPLET DES THEMES OSHI NO KO */
  /* On force ces variables pour TOUS les thèmes (Ai, Ruby, etc.) quand on est ici */
  :root, [data-theme='ai'], [data-theme='ruby'], [data-theme='aqua'], [data-theme='kana'] {
    --theme-color: #007bff !important; /* Bleu Autorité / Staff */
    --theme-dim: rgba(0, 123, 255, 0.1) !important;
    --theme-glow: rgba(0, 123, 255, 0.5) !important;
    --bg-main: #050a0f !important;
    --bg-pattern: linear-gradient(rgba(0, 123, 255, 0.05) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(0, 123, 255, 0.05) 1px, transparent 1px) !important;
    background-size: 30px 30px !important;
    --ui-radius: 4px !important;
    --ui-border: 1px solid #007bff !important;
    --theme-icon: "🛡️" !important;
    --font-headers: 'Fira Code', monospace !important;
  }

  /* 2. NETTOYAGE DE L'INTERFACE PUBLIQUE */
  #theme-picker, .fx-star, .fx-heart, .fx-orb { 
    display: none !important; /* On vire le sélecteur et les particules mignonnes */
  }

  /* 3. TRANSFORMATION DU LOADER */
  #loader-star { content: "🕵️" !important; animation: pulseStaff 1s infinite !important; }
  .loader-text { content: "VÉRIFICATION DES ACCRÉDITATIONS..." !important; color: #007bff !important; letter-spacing: 2px !important; }

  @keyframes pulseStaff { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

  /* 4. STYLE "RESTRICTED AREA" POUR LE CONTENU */
  .markdown-section h1::before {
    content: "UNCLASSIFIED // INTERNAL ONLY";
    display: block;
    font-size: 10px;
    color: #555;
    letter-spacing: 3px;
    margin-bottom: 10px;
  }

  /* Sidebar plus rigide */
  .sidebar {
    background: #020508 !important;
    border-right: 2px solid #007bff !important;
  }

  /* Tableaux plus pro/industriels */
  .markdown-section table {
    border: 1px solid #007bff !important;
    background: rgba(0,0,0,0.8) !important;
  }

  /* Bouton de copie façon "Archive" */
  .docsify-copy-code-button {
    border-radius: 0px !important;
    text-transform: uppercase !important;
  }
</style>

<div class="staff-overlay"></div>

<style>
  .staff-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.15),
      rgba(0, 0, 0, 0.15) 1px,
      transparent 1px,
      transparent 2px
    );
    pointer-events: none;
    z-index: 9999; /* Par-dessus tout pour l'effet vieux moniteur */
    opacity: 0.3;
  }
</style>

<script>
  (function() {
    console.log("🛡️ Mode Staff Activé : Accès restreint.");
    // On peut même changer le titre de l'onglet dynamiquement
    document.title = "SOLUS // STAFF PANEL";
    
    // Petite animation de "Typewriter" sur le titre principal
    const h1 = document.querySelector('h1');
    if (h1) {
      h1.style.borderLeft = "4px solid #007bff";
      h1.style.paddingLeft = "15px";
    }
  })();
</script>
