<!-- 
  THEME.HTML - CYBERPUNK PROTOCOL v2
  Ce fichier écrase complètement le fond bordeaux et les animations originales.
-->

<style>
  :root {
    /* Palette Cyberpunk High-Contrast */
    --bg-color: #020205;
    --text-color: #00fbff;
    --heading-color: #ff00ff; /* Rose Néon */
    --accent-color: #00fbff;  /* Cyan Néon */
    --accent-hover: #00fbff;
    --border-color: #003333;
    --star-color: #ffff00;

    /* Sidebar */
    --nav-line-color: rgba(0, 251, 255, 0.3);
    --nav-hover-bg: rgba(0, 251, 255, 0.1);
  }

  /* 1. ON SUPPRIME LES BULLES ROUGES DU FOND ORIGINAL */
  .animated-background::before, 
  .animated-background::after {
    display: none !important;
    animation: none !important;
  }

  /* 2. ON REMPLACE LE FOND PAR UNE GRILLE ANIMÉE */
  .animated-background {
    background-color: var(--bg-color) !important;
    background-image: 
      linear-gradient(rgba(0, 251, 255, 0.1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 251, 255, 0.1) 1px, transparent 1px) !important;
    background-size: 50px 50px !important;
    background-position: center center !important;
    animation: grid-travel 60s linear infinite !important;
  }

  @keyframes grid-travel {
    from { background-position: 0 0; }
    to { background-position: 0 1000px; }
  }

  /* 3. EFFET DE VIGNETTAGE ET LUEUR NÉON */
  .cyber-vignette {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: radial-gradient(circle, transparent 20%, rgba(2, 2, 5, 0.8) 100%);
    pointer-events: none;
    z-index: -1;
  }

  /* 4. STYLE DES TITRES (GLITCH & GLOW) */
  .markdown-section h1 {
    color: #fff !important;
    text-shadow: 2px 2px #ff00ff, -2px -2px #00fbff !important;
    text-transform: uppercase;
    letter-spacing: 4px;
    font-style: italic;
  }

  .markdown-section h2 {
    border-bottom: 3px solid var(--accent-color) !important;
    box-shadow: 0 4px 10px -2px rgba(0, 251, 255, 0.5);
    background: rgba(0, 251, 255, 0.05);
    padding-left: 10px !important;
  }

  .markdown-section h2::before {
    content: "READY > " !important;
    font-family: monospace;
    font-size: 0.8rem;
    color: var(--accent-color);
  }

  /* 5. SIDEBAR CYBER */
  .sidebar {
    background-color: rgba(5, 5, 15, 0.9) !important;
    border-right: 2px solid var(--accent-color) !important;
    box-shadow: 10px 0 20px rgba(0, 0, 0, 0.8) !important;
  }

  .sidebar-nav ul li a.active {
    background-color: var(--accent-color) !important;
    color: #000 !important;
    box-shadow: 0 0 15px var(--accent-color) !important;
    font-weight: 900 !important;
  }

  /* 6. OVERLAY SCANLINES (Effet écran cathodique) */
  .scanlines {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(
      rgba(18, 16, 16, 0) 50%, 
      rgba(0, 0, 0, 0.1) 50%
    );
    background-size: 100% 4px;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.2;
  }

  /* 7. BLOCS DE CODE */
  .markdown-section pre {
    border: 1px solid var(--accent-color) !important;
    background: rgba(0, 20, 20, 0.9) !important;
    box-shadow: 0 0 20px rgba(0, 251, 255, 0.1) !important;
  }

  /* Scrollbar Neon */
  ::-webkit-scrollbar-thumb {
    background: var(--accent-color) !important;
    border: 2px solid var(--bg-color);
  }
  /* --- FIX COULEUR TEXTE SIDEBAR --- */
  
  /* 1. Couleur des liens normaux (sous-menus) */
  .sidebar-nav ul li a {
    color: var(--text-color) !important;
    text-shadow: 0 0 5px rgba(0, 251, 255, 0.2);
  }

  /* 2. Couleur des dossiers (Niveau 1 : ex SHOP, RULES...) */
  .sidebar-nav ul:not(.app-sub-sidebar) > li.collapse > a,
  .sidebar-nav ul:not(.app-sub-sidebar) > li.collapse > p {
    color: var(--heading-color) !important; /* Utilise le Rose Néon pour les dossiers */
    text-shadow: 0 0 8px rgba(255, 0, 255, 0.4) !important;
  }

  /* 3. Couleur au survol */
  .sidebar-nav ul li a:hover {
    color: #fff !important;
    background-color: var(--nav-hover-bg) !important;
    text-shadow: 0 0 10px var(--accent-color) !important;
  }

  /* 4. Les chevrons (petites flèches) des dossiers */
  .sidebar-nav li.collapse > a::before,
  .sidebar-nav li.collapse > p::before {
    border-right: 2px solid var(--heading-color) !important;
    border-bottom: 2px solid var(--heading-color) !important;
  }

  /* 5. La ligne verticale de l'arborescence */
  .sidebar-nav .app-sub-sidebar {
    border-left: 2px solid var(--nav-line-color) !important;
  }
  
  /* 6. Couleur du texte de recherche */
  .sidebar .search input {
    color: var(--accent-color) !important;
    border-color: var(--border-color) !important;
  }
  .sidebar .search input::placeholder {
    color: rgba(0, 251, 255, 0.4) !important;
  }
  /* --- RESET & FIX DU GLOW (LUEUR) DU MENU --- */

  /* 1. Le titre principal "Solus Wiki" */
  .sidebar > h1 {
    text-shadow: 0 0 15px var(--accent-color) !important;
    border-bottom: 2px solid var(--accent-color) !important;
  }

  /* 2. Lueur du bouton de recherche quand on clique dessus */
  .sidebar .search input:focus {
    box-shadow: 0 0 15px rgba(0, 251, 255, 0.4) !important;
    border-color: var(--accent-color) !important;
  }

  /* 3. Lueur de la page ACTIVE (le lien sélectionné) */
  .sidebar-nav ul li.active > a {
    /* On écrase le box-shadow rouge par du Cyan Cyberpunk */
    box-shadow: 0 0 20px rgba(0, 251, 255, 0.6) !important;
    background-color: var(--accent-color) !important;
    color: #000 !important;
    border: none !important;
  }

  /* 4. Lueur au survol des liens (Dossiers et fichiers) */
  .sidebar-nav ul:not(.app-sub-sidebar) > li.collapse > a:hover,
  .sidebar-nav ul:not(.app-sub-sidebar) > li.collapse > p:hover,
  .sidebar-nav ul li a:hover {
    text-shadow: 0 0 10px var(--accent-color) !important;
  }

  /* 5. Fix de la barre de scroll (elle avait peut-être gardé du rouge) */
  ::-webkit-scrollbar-thumb {
    background: var(--accent-color) !important;
    box-shadow: 0 0 10px var(--accent-color) !important;
  }

  /* 6. Fix couleur du texte de recherche et résultats */
  .sidebar .search input {
    color: var(--accent-color) !important;
  }
  
  /* Surlignage des mots trouvés dans la recherche */
  .search .search-results .matching-post em {
    color: var(--accent-color) !important;
    background: rgba(0, 251, 255, 0.2) !important;
    text-shadow: 0 0 5px var(--accent-color) !important;
  }
</style>

<!-- HTML injecté pour les effets visuels -->
<div class="cyber-vignette"></div>
<div class="scanlines"></div>

<!-- Décoration : Ligne d'horizon néon en bas -->
<div style="position: fixed; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--accent-color); box-shadow: 0 0 20px var(--accent-color); z-index: 10;"></div>
