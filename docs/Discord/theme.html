<style>
  /* 1. VARIABLES DISCORD CYBERPUNK */
  :root, [data-theme='ai'], [data-theme='ruby'], [data-theme='aqua'] {
    --cyber-blurple: #00d9ff; /* Bleu électrique futuriste */
    --cyber-pink: #ff0055;
    --bg-discord-cyber: #0a0b10;
    --panel-glass: rgba(20, 22, 28, 0.7);
    
    --theme-color: var(--cyber-blurple) !important;
    --theme-dim: rgba(0, 217, 255, 0.1) !important;
    --theme-glow: rgba(0, 217, 255, 0.6) !important;
    --bg-main: var(--bg-discord-cyber) !important;
    --bg-pattern: linear-gradient(rgba(0, 217, 255, 0.03) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(0, 217, 255, 0.03) 1px, transparent 1px) !important;
    background-size: 50px 50px !important;
    --ui-radius: 2px !important; /* Bordures tranchantes */
    --ui-border: 1px solid var(--cyber-blurple) !important;
    --font-headers: 'Fira Code', monospace !important;
    --theme-icon: "⌬" !important;
  }

  /* 2. SIDEBAR HOLOGRAPHIQUE */
  .sidebar {
    background: var(--panel-glass) !important;
    backdrop-filter: blur(15px) !important;
    border-right: 1px solid var(--cyber-blurple) !important;
    box-shadow: 10px 0 30px rgba(0, 217, 255, 0.1);
  }

  .sidebar-nav ul li a {
    color: #5d748a !important;
    text-transform: uppercase;
    font-size: 0.85em;
    letter-spacing: 1px;
    transition: 0.4s ease;
    border-left: 2px solid transparent;
  }

  .sidebar-nav ul li a:hover, .sidebar-nav ul li.active > a {
    color: var(--cyber-blurple) !important;
    background: linear-gradient(90deg, rgba(0, 217, 255, 0.1), transparent) !important;
    border-left: 2px solid var(--cyber-blurple);
    text-shadow: 0 0 10px var(--cyber-blurple);
  }

  .sidebar-nav ul li a::before { content: "› " !important; color: var(--cyber-blurple); }

  /* 3. CONTENU : L'INTERFACE DE DONNÉES */
  .markdown-section {
    background: rgba(10, 11, 16, 0.8) !important;
    padding: 40px !important;
    border: 1px solid rgba(0, 217, 255, 0.1);
  }

  /* Titres avec scanlines */
  .markdown-section h1, .markdown-section h2 {
    color: #fff !important;
    text-shadow: 2px 2px 0px var(--cyber-pink);
    border-bottom: 1px solid var(--cyber-blurple) !important;
    display: inline-block;
    padding-right: 50px;
  }

  /* Blockquote = Hologram Embed */
  .markdown-section blockquote {
    background: rgba(0, 217, 255, 0.05) !important;
    border: 1px solid var(--cyber-blurple) !important;
    position: relative;
    overflow: hidden;
  }
  
  .markdown-section blockquote::after {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 217, 255, 0.02) 2px, rgba(0, 217, 255, 0.02) 4px);
    pointer-events: none;
  }

  /* 4. PROGRESS BAR NÉON */
  #reading-progress {
    height: 2px !important;
    background: var(--cyber-blurple) !important;
    box-shadow: 0 0 15px var(--cyber-blurple), 0 0 5px #fff;
  }

  /* Bouton de recherche */
  .search input {
    background: transparent !important;
    border: 1px solid var(--cyber-blurple) !important;
    color: var(--cyber-blurple) !important;
    clip-path: polygon(0% 0%, 90% 0%, 100% 100%, 10% 100%); /* Forme futuriste */
  }
</style>

<div id="cyber-grid"></div>

<style>
  #cyber-grid {
    position: fixed;
    bottom: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background-image: 
      linear-gradient(rgba(0, 217, 255, 0.1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 217, 255, 0.1) 1px, transparent 1px);
    background-size: 100px 100px;
    transform: perspective(500px) rotateX(60deg);
    z-index: -2;
    animation: gridMove 20s linear infinite;
  }

  @keyframes gridMove {
    from { background-position: 0 0; }
    to { background-position: 0 100px; }
  }
</style>

<script>
  (function() {
    console.log("⚡ Link Start: Future Discord UI loaded.");
    document.title = "SYNC // DISCORD_2077";
    
    // On change le loader
    const loader = document.getElementById('loader-star');
    if(loader) {
      loader.innerText = "⌬";
      loader.style.color = "#00d9ff";
      loader.style.textShadow = "0 0 20px #00d9ff";
    }

    const loaderText = document.querySelector('.loader-text');
    if(loaderText) loaderText.innerText = "SYNCHRONISATION NEURALE...";
  })();
</script>
