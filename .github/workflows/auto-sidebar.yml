name: Auto Sidebar (Racine)

on:
  push:
    paths:
      - '**/*.md'  # Se lance quand un fichier Markdown change
  workflow_dispatch:

permissions:
  contents: write

# Empêche les conflits si tu fais deux modifications rapides
concurrency:
  group: sidebar-update
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Générer _sidebar.md
        run: |
          # On supprime l'ancien
          rm -f _sidebar.md

          # Entête
          echo "* [🌟 Accueil](README.md)" > _sidebar.md
          echo "" >> _sidebar.md

          # 1. Scanner les dossiers (ex: /Personnages)
          find . -maxdepth 1 -type d -not -path '*/.*' -not -path '.' | sort | while read -r dir; do
            folder=$(basename "$dir")
            # On ignore le dossier wiki s'il traine encore, et le dossier des images si tu en as un
            if [[ "$folder" == "wiki" || "$folder" == "images" || "$folder" == "img" ]]; then continue; fi

            # Titre du dossier (Joli format)
            folder_name=$(echo "$folder" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++)sub(/./,toupper(substr($i,1,1)),$i)}1')
            echo "* 📂 **$folder_name**" >> _sidebar.md

            # Fichiers dans ce dossier
            find "$dir" -maxdepth 1 -name "*.md" | sort | while read -r file; do
              name=$(basename "$file" .md)
              if [[ "$name" == "README" || "$name" == "_sidebar" ]]; then continue; fi
              
              clean_name=$(echo "$name" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++)sub(/./,toupper(substr($i,1,1)),$i)}1')
              # Nettoyage du chemin (enlever le ./ au début)
              path=$(echo "$file" | sed 's|^\./||')
              
              echo "  * [📄 $clean_name]($path)" >> _sidebar.md
            done
          done

          echo "" >> _sidebar.md

          # 2. Fichiers orphelins à la racine (sauf README)
          find . -maxdepth 1 -name "*.md" | sort | while read -r file; do
             name=$(basename "$file" .md)
             if [[ "$name" == "README" || "$name" == "_sidebar" ]]; then continue; fi
             
             clean_name=$(echo "$name" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++)sub(/./,toupper(substr($i,1,1)),$i)}1')
             path=$(echo "$file" | sed 's|^\./||')
             
             echo "* [📄 $clean_name]($path)" >> _sidebar.md
          done

      - name: Commit & Push
        run: |
          git config --global user.name "Robot Sidebar"
          git config --global user.email "actions@github.com"
          git add _sidebar.md
          if git diff --staged --quiet; then
            echo "Rien à changer"
          else
            git commit -m "✨ Mise à jour du menu"
            git pull --rebase
            git push
          fi
