name: UPDATE CARDINAL MENU

on:
  push:
    paths:
      - '**.md' # Le robot s'active UNIQUEMENT quand tu touches à un Markdown
      - 'scan.py'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Autorise le robot à écrire le menu

    steps:
      - name: 📥 Clonage des données
        uses: actions/checkout@v4
        
      - name: ⚙️ Lancement du Cardinal Script
        run: python scan.py
        
      - name: 💾 Sauvegarde du nouveau Menu
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[SYS] Auto-update Menu Navigation"
          file_pattern: _sidebar.md
