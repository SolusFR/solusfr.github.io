name: Génération Automatique de la Sidebar Docsify

# Ce robot s'active à chaque fois que tu modifies quelque chose dans le dossier "wiki"
on:
  push:
    paths:
      - 'wiki/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Générer la Sidebar automatiquement
        # Utilise l'outil officiel Docsify pour scanner le dossier wiki et créer la liste
        run: npx docsify-cli generate ./wiki

      - name: Sauvegarder et envoyer le fichier _sidebar.md
        run: |
          git config --global user.name "Robot Oshi no Ko"
          git config --global user.email "actions@github.com"
          git add wiki/_sidebar.md
          # Si rien n'a changé, on ignore, sinon on commit
          git commit -m "✨ Auto-update de la navigation du Wiki" || exit 0
          git push
