name: UPDATE CARDINAL MENU

on:
  push:
    paths:
      - '**.md'      # S'active quand un fichier Markdown est modifié
      - 'scan.py'    # S'active si tu modifies le script lui-même
  workflow_dispatch: # Permet de lancer le script manuellement depuis l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial pour permettre au bot de push les modifications

    steps:
      - name: 📥 Clonage du dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère tout l'historique pour éviter les erreurs de push

      - name: ⚙️ Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🚀 Lancement du Cardinal Script
        run: |
          if [ -f scan.py ]; then
            python3 scan.py
          else
            echo "Erreur : scan.py est introuvable à la racine du dépôt."
            exit 1
          fi

      - name: 💾 Sauvegarde du nouveau Menu
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[SYS] Auto-update Menu Navigation"
          file_pattern: "_sidebar.md"
          skip_dirty_check: false # Ne commit que s'il y a des changements réels
