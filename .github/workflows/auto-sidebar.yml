name: Génération Automatique de la Sidebar (Sur-mesure)

on:
  push:
    paths:
      - 'wiki/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Générer la Sidebar avec emojis et majuscules
        run: |
          cd wiki
          rm -f _sidebar.md
          echo "* [🌟 Accueil](README.md)" > _sidebar.md
          echo "" >> _sidebar.md
          
          # Chercher tous les sous-dossiers
          find . -mindepth 1 -type d | sort | while read -r dir; do
            folder=$(basename "$dir")
            # Ignorer les dossiers cachés
            if [[ "$folder" == .* ]]; then continue; fi
            
            # Formater le nom avec des majuscules (ex: "saison-2" -> "Saison 2")
            folder_name=$(echo "$folder" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++)sub(/./,toupper(substr($i,1,1)),$i)}1')
            echo "* 📂 **$folder_name**" >> _sidebar.md
            
            # Ajouter les fichiers .md du dossier
            find "$dir" -maxdepth 1 -name "*.md" ! -name "README.md" ! -name "_sidebar.md" | sort | while read -r file; do
              name=$(basename "$file" .md)
              clean_name=$(echo "$name" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++)sub(/./,toupper(substr($i,1,1)),$i)}1')
              filepath=$(echo "$file" | sed 's|^\./||')
              echo "  * [📄 $clean_name]($filepath)" >> _sidebar.md
            done
          done
          
          # Ajouter les fichiers qui sont à la racine (sauf README)
          echo "" >> _sidebar.md
          find . -maxdepth 1 -name "*.md" ! -name "README.md" ! -name "_sidebar.md" | sort | while read -r file; do
             name=$(basename "$file" .md)
             clean_name=$(echo "$name" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++)sub(/./,toupper(substr($i,1,1)),$i)}1')
             filepath=$(echo "$file" | sed 's|^\./||')
             echo "* 📄 [$clean_name]($filepath)" >> _sidebar.md
          done

      - name: Sauvegarder et envoyer le fichier _sidebar.md
        run: |
          git config --global user.name "Robot Oshi no Ko"
          git config --global user.email "actions@github.com"
          git add _sidebar.md
          git commit -m "✨ Auto-update de la navigation du Wiki (Script Custom)" || exit 0
          git push
