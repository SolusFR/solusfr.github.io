name: Génération Automatique de la Sidebar Docsify

on:
  push:
    paths:
      - 'wiki/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js (Version 20)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Générer la Sidebar automatiquement
        run: |
          # 1. On efface l'ancien menu pour que Docsify ne bloque pas
          rm -f wiki/_sidebar.md
          # 2. On génère le nouveau menu
          npx docsify-cli generate ./wiki

      - name: Sauvegarder et envoyer le fichier _sidebar.md
        run: |
          git config --global user.name "Robot Oshi no Ko"
          git config --global user.email "actions@github.com"
          git add wiki/_sidebar.md
          git commit -m "✨ Auto-update de la navigation du Wiki" || exit 0
          git push
