<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LifeSteal FR Wiki</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Thème Vue -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <!-- Plugin Sidebar Collapse pour l'effet "Dossier" -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />

  <style>
    :root { --theme-color: #42b983; }
    /* Petite icone de dossier devant les groupes */
    .folder-icon { margin-right: 5px; }
  </style>
</head>
<body>
  <div id="app">Chargement de l'arborescence...</div>

  <script>
    window.$docsify = {
      name: 'LifeSteal FR Wiki',
      repo: '',
      homepage: 'README.md',
      loadSidebar: true, // Obligatoire pour lire le fichier généré
      subMaxLevel: 2,
      auto2top: true,
      
      // Configuration de la recherche
      search: {
        placeholder: 'Rechercher un guide...',
        noData: 'Aucun résultat.',
        depth: 6
      },

      // Configuration du plugin d'arborescence (Sidebar Collapse)
      sidebarDisplayLevel: 1, // 1 = Ferme tout sauf le niveau principal par défaut
    }
  </script>

  <!-- Scripts Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  
  <!-- Plugin indispensable pour l'effet "Arborescence de dossier" -->
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
