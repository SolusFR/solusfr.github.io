<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Cardinal Wiki</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
</head>
<body>
  <div id="app">Chargement du wiki...</div>
  <script>
    window.$docsify = {
      name: 'Cardinal Wiki',
      loadSidebar: true,
      // FORCE l'accueil sur le README du dossier wiki
      homepage: 'wiki/README.md', 
      
      // Configuration des chemins
      alias: {
        # Permet de trouver le sidebar à la racine même depuis un sous-dossier
        '/.*/_sidebar.md': '/_sidebar.md',
        # Si docsify cherche un fichier à la racine, il regarde dans wiki/
        '/([^wiki].*)': '/wiki/$1'
      },
      
      subMaxLevel: 3,
      sidebarDisplayLevel: 1,
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
