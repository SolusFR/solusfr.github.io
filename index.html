<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Solus Wiki ★ Oshi no Ko</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Police Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.css" />

  <style>
    /* --- SYSTÈME DE THÈMES V2 (Couleurs Profondes & Contrastées) --- */
    :root {
      /* Valeurs par défaut (Ai) */
      --theme-color: #ff55aa; 
      --theme-dim: #550022;
      --bg-radial-center: #2a0a1a;
      --bg-main: #0a0105;
      --text-color: #f0f0f0;
      --folder-icon: "★";
    }

    [data-theme='ai'] { 
      --theme-color: #ff55aa; /* Rose Ai vibrant */
      --theme-dim: #440a22;
      --bg-radial-center: #1f0510;
      --bg-main: #080103;
      --folder-icon: "★";
    }
    [data-theme='ruby'] { 
      --theme-color: #ff0044; /* Rouge Ruby intense */
      --theme-dim: #44000a;
      --bg-radial-center: #200005;
      --bg-main: #050001;
      --folder-icon: "❤";
    }
    [data-theme='aqua'] { 
      --theme-color: #00eeff; /* Cyan Aqua électrique */
      --theme-dim: #002233;
      --bg-radial-center: #00111f;
      --bg-main: #000205;
      --folder-icon: "♦";
    }

    /* --- FOND ET BASE --- */
    body { 
      font-family: 'Poppins', sans-serif !important;
      background-color: var(--bg-main) !important;
      /* Dégradé Radial Fixe (Spotlight) */
      background-image: radial-gradient(circle at 50% -20%, var(--bg-radial-center) 0%, var(--bg-main) 80%) !important;
      background-attachment: fixed;
      background-repeat: no-repeat;
      color: var(--text-color);
      overflow-x: hidden;
    }

    /* Étoiles d'ambiance */
    #stars-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: -1;
    }
    .star {
      position: absolute; color: var(--theme-color);
      opacity: 0; animation: twinkle linear infinite;
    }
    @keyframes twinkle {
      0% { opacity: 0; transform: scale(0.3); }
      50% { opacity: 0.7; text-shadow: 0 0 8px var(--theme-color); transform: scale(1); }
      100% { opacity: 0; transform: scale(0.3); }
    }

    /* --- SIDEBAR (LOGE VIP) --- */
    .sidebar { 
      background: rgba(5, 5, 8, 0.9) !important; 
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(255, 255, 255, 0.05) !important;
      padding-top: 20px;
    }
    
    .sidebar h1 {
      font-weight: 800; letter-spacing: 1px; color: #fff;
      text-shadow: 0 0 15px var(--theme-color);
      border-bottom: 2px solid var(--theme-color);
      padding-bottom: 15px; margin-bottom: 20px;
    }

    /* --- SYSTÈME DE DOSSIERS (OPEN/CLOSE) --- */
    .sidebar ul li a {
      transition: all 0.3s ease;
      font-weight: 400;
      border-left: 2px solid transparent;
      padding-left: 10px;
      color: #aaa;
    }
    .sidebar ul li a:hover { color: #fff; }

    /* Dossier DEPLIÉ (Open) */
    .sidebar ul li.open > a {
      color: #fff !important;
      font-weight: 800 !important;
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px var(--theme-color);
      background: linear-gradient(90deg, var(--theme-dim), transparent);
      border-left: 3px solid var(--theme-color);
    }
    
    /* Icône tournante dossier ouvert */
    .sidebar ul li.open > a::after {
      content: var(--folder-icon);
      float: right; margin-right: 10px;
      color: var(--theme-color);
      animation: spinIcon 10s linear infinite;
    }

    /* Sous-menu */
    .app-sub-sidebar {
      margin-left: 10px !important;
      border-left: 1px dashed rgba(255, 255, 255, 0.2);
    }
    
    /* Page ACTIVE */
    .sidebar ul li.active > a {
      color: var(--theme-color) !important;
      font-weight: 600;
      background: transparent; 
    }

    @keyframes spinIcon { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* --- CONTENU & TABLEAUX --- */
    .markdown-section h1, .markdown-section h2, .markdown-section h3 {
      color: #fff; text-shadow: 0 2px 15px var(--bg-radial-center);
    }
    .markdown-section a { color: var(--theme-color); font-weight: 600; text-decoration: none; }
    .markdown-section strong { color: var(--theme-color); text-shadow: 0 0 5px var(--theme-dim); }
    
    /* --- TABLEAUX FIX (Anti-Fond Blanc) --- */
    .markdown-section table {
      display: table !important;
      width: 100%;
      border-collapse: collapse;
      background: rgba(0, 0, 0, 0.2) !important; /* Fond sombre semi-transparent */
      border: 1px solid var(--theme-dim) !important;
      margin-bottom: 20px;
    }

    /* Entête du tableau */
    .markdown-section table th {
      background-color: var(--theme-dim) !important;
      border: 1px solid var(--theme-color) !important;
      color: #fff !important;
      font-weight: 800;
      text-transform: uppercase;
      padding: 12px !important;
    }

    /* Cellules normales */
    .markdown-section table td {
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: #ddd !important; /* Texte gris clair lisible */
      padding: 10px !important;
    }

    /* Lignes Alternées (Zebra) - LE FIX EST ICI */
    /* On force une couleur sombre/transparente au lieu du blanc par défaut */
    .markdown-section table tr:nth-child(2n) {
      background-color: rgba(255, 255, 255, 0.03) !important;
    }
    .markdown-section table tr:nth-child(odd) {
      background-color: transparent !important;
    }

    /* Survol d'une ligne */
    .markdown-section table tr:hover {
      background-color: var(--theme-dim) !important;
      transition: background 0.3s;
    }

    /* Code blocks style */
    .markdown-section pre { background: #0e0e0e !important; border: 1px solid #333; }
    code { background: var(--theme-dim) !important; color: #fff !important; }

    /* --- THEME PICKER --- */
    #theme-picker {
      position: fixed; top: 15px; right: 25px; z-index: 1000;
      background: rgba(0, 0, 0, 0.7);
      padding: 8px 15px; border-radius: 50px;
      border: 1px solid var(--theme-color);
      box-shadow: 0 0 10px var(--theme-color);
      display: flex; gap: 10px; align-items: center;
    }
    .theme-dot {
      width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
      border: 2px solid #fff; transition: transform 0.2s;
    }
    .theme-dot:hover { transform: scale(1.3); box-shadow: 0 0 10px currentColor; }

  </style>
</head>
<body>
  
  <div id="stars-container"></div>

  <div id="theme-picker">
    <span style="color:#fff; font-size:10px; font-weight:bold; letter-spacing:1px; margin-right:5px;">OSHI</span>
    <div class="theme-dot" style="background:#ff55aa; color:#ff55aa" onclick="setTheme('ai')" title="Ai"></div>
    <div class="theme-dot" style="background:#ff0044; color:#ff0044" onclick="setTheme('ruby')" title="Ruby"></div>
    <div class="theme-dot" style="background:#00eeff; color:#00eeff" onclick="setTheme('aqua')" title="Aqua"></div>
  </div>

  <div id="app">Chargement du wiki...</div>

  <script>
    // --- Gestion des Thèmes ---
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('solus-wiki-theme', theme);
      if (window.$docsify) window.$docsify.themeColor = getComputedStyle(document.documentElement).getPropertyValue('--theme-color').trim();
      generateStars();
    }
    const saved = localStorage.getItem('solus-wiki-theme') || 'ai';
    setTheme(saved);

    // --- Étoiles de fond (Discrètes) ---
    function generateStars() {
      const container = document.getElementById('stars-container');
      container.innerHTML = '';
      const starCount = 50;
      for (let i = 0; i < starCount; i++) {
        let star = document.createElement('div');
        star.className = 'star';
        star.innerHTML = '✦'; 
        star.style.left = Math.random() * 100 + 'vw';
        star.style.top = Math.random() * 100 + 'vh';
        star.style.fontSize = (Math.random() * 10 + 2) + 'px';
        star.style.animationDuration = (Math.random() * 5 + 3) + 's';
        star.style.animationDelay = (Math.random() * 5) + 's';
        container.appendChild(star);
      }
    }
    window.onload = generateStars;

    window.$docsify = {
      name: 'Solus Wiki <span>★</span>',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      sidebarDisplayLevel: 1, 
      auto2top: true,
      search: {
        placeholder: 'Rechercher...',
        noData: 'Rien trouvé !'
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
