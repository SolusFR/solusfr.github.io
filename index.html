<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Solus Wiki</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Police "Poppins" -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="branding/logo-icon.png">

  <!-- Thème de base Dark -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/lib/themes/dark.css">
  
  <!-- CSS pour la barre latérale DÉPLIABLE -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />

  <!-- DESIGN "RUBY RED THEME" FIXÉ (Custom CSS) -->
  <style>
    :root {
      /* Palette "Ruby Hoshino" (Rouge Rubis / Bordeaux) */
      --bg-color: #0b0204;
      --text-color: #ffeff3;
      --heading-color: #ff4d6d;
      --accent-color: #ff1e46;
      --accent-hover: #ff4d6d;
      --border-color: #4a0d1a;
      --star-color: #ffdf00;

      /* 🛠️ VARIABLES DE LA SIDEBAR ET SOUS-MENUS */
      --sidebar-width: 300px;
      --nav-folder-weight: 800;             /* Épaisseur des dossiers (ex: SHOP) */
      --nav-item-weight: 500;               /* Épaisseur des sous-menus (ex: Terms) */
      --nav-indent: 15px;                   /* Décalage des sous-menus vers la droite */
      --nav-line-color: rgba(255, 30, 70, 0.2); /* Couleur de la ligne de l'arbre (Rouge sombre) */
      --nav-hover-bg: rgba(255, 30, 70, 0.15);  /* Fond au survol des liens */
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    ::selection { background: var(--accent-color); color: #fff; }

    /* Rend le fond sombre/transparent quand on clique sur une image Docsify */
    .medium-zoom-overlay { background-color: rgba(11, 11, 14, 0.9) !important; }

    /* ================= ANIMATION DE FOND ================= */
    .animated-background {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -2; background-color: var(--bg-color); overflow: hidden;
      will-change: transform;
    }
    .animated-background::before, .animated-background::after {
      content: ''; position: absolute; border-radius: 50%;
      filter: blur(120px); opacity: 0.35;
      animation: float 12s infinite alternate ease-in-out;
      will-change: transform;
    }
    .animated-background::before { width: 45vw; height: 45vw; background: var(--accent-color); top: -10vw; left: -10vw; }
    .animated-background::after { width: 40vw; height: 40vw; background: #8a0820; bottom: -10vw; right: -10vw; animation-duration: 16s; animation-delay: -5s; }
    
    @keyframes float {
      0% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.2; }
      100% { transform: translate3d(60px, 40px, 0) scale(1.15); opacity: 0.45; }
    }

    /* ================= BARRE LATÉRALE (ARBORESCENCE AVANCÉE) ================= */
    .sidebar {
      width: var(--sidebar-width) !important;
      background-color: rgba(14, 2, 4, 0.75) !important;
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border-right: 1px solid rgba(255, 30, 70, 0.15);
      box-shadow: 2px 0 20px rgba(0, 0, 0, 0.6);
    }
    .content { left: var(--sidebar-width) !important; transition: left 0.25s ease; }

    .sidebar > h1 {
      font-weight: 900; font-size: 1.4rem; color: #fff; text-transform: uppercase;
      margin: 20px 0; text-align: center; text-shadow: 0 0 12px rgba(255, 30, 70, 0.8);
      border-bottom: 2px solid var(--accent-color); padding-bottom: 15px;
    }
    .sidebar > h1 .app-name-link::after { content: " ✨"; }
    
    /* Barre de recherche */
    .sidebar .search { margin-bottom: 20px; border: none !important; }
    .sidebar .search input {
      background-color: rgba(10, 2, 3, 0.8) !important; border: 1px solid var(--border-color) !important;
      color: #fff !important; border-radius: 12px !important; padding: 10px 15px !important; 
      font-family: 'Poppins', sans-serif; text-align: center; font-weight: 600;
      -webkit-appearance: none;
    }
    .sidebar .search input:focus { border-color: var(--accent-color) !important; box-shadow: 0 0 10px rgba(255, 30, 70, 0.3) !important; outline: none; }

    /* 📁 NIVEAU 1 : LES DOSSIERS (Ex: "SHOP") */
    .sidebar-nav ul:not(.app-sub-sidebar) > li.collapse > a,
    .sidebar-nav ul:not(.app-sub-sidebar) > li.collapse > p {
      font-weight: var(--nav-folder-weight) !important;
      color: var(--heading-color) !important;
      text-transform: uppercase; letter-spacing: 1.5px;
      font-size: 1.05em; margin-top: 15px; padding: 8px 15px;
      display: flex; align-items: center;
      transition: text-shadow 0.3s;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    
    /* Chevron animé pour les dossiers */
    .sidebar-nav li.collapse > a::before,
    .sidebar-nav li.collapse > p::before {
      content: '' !important; display: inline-block;
      width: 6px; height: 6px; margin-right: 12px;
      border-right: 2px solid var(--heading-color); border-bottom: 2px solid var(--heading-color);
      transform: translateY(-2px) rotate(45deg); /* Flèche vers le bas (ouvert) */
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink: 0;
    }
    .sidebar-nav li.collapse.close > a::before,
    .sidebar-nav li.collapse.close > p::before {
      transform: translateY(-2px) rotate(-45deg); /* Flèche vers la droite (fermé) */
    }

    /* 📄 NIVEAU 2+ : LES SOUS-MENUS (Ex: "Terms") */
    .sidebar-nav .app-sub-sidebar {
      margin: 5px 0 15px 18px !important;
      padding-left: var(--nav-indent) !important;
      border-left: 2px solid var(--nav-line-color) !important;
    }
    
    /* Liens des sous-menus */
    .sidebar-nav ul li a { 
      color: #ffb3c6; font-size: 0.95rem; font-weight: var(--nav-item-weight);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 8px; padding: 8px 12px; margin: 2px 0;
      text-decoration: none; display: block;
      white-space: normal !important; word-wrap: break-word !important; 
      -webkit-tap-highlight-color: transparent;
    }
    .sidebar-nav ul li a:hover {
      color: #fff; background-color: var(--nav-hover-bg);
      transform: translateX(5px);
    }
    
    /* Page Actuellement ouverte */
    .sidebar-nav ul li.active > a {
      color: #fff !important; background-color: var(--accent-color);
      font-weight: 700; box-shadow: 0 4px 12px rgba(255, 30, 70, 0.4);
      transform: translateX(0); /* Annule le transform du hover */
    }
    
    /* Masquer les puces par défaut de docsify */
    .sidebar-nav .app-sub-sidebar li::before { display: none !important; }

    /* ================= ADAPTATION DES FICHIERS .MD ================= */
    .markdown-section { max-width: 900px; padding: 40px; position: relative; z-index: 1; }
    .markdown-section h1, .markdown-section h2, .markdown-section h3, .markdown-section h4 { color: var(--heading-color); font-weight: 800; text-transform: uppercase; word-wrap: break-word !important;}
    .markdown-section h1 { font-size: 2.5rem; margin-bottom: 1.5rem; text-shadow: 0 2px 10px rgba(255, 77, 109, 0.3); }
    .markdown-section h2 { font-size: 1.8rem; border-bottom: 2px dashed var(--border-color); padding-bottom: 0.5rem; margin-top: 2.5rem; }
    .markdown-section h2::before { content: "✨ "; color: var(--star-color); text-shadow: 0 0 8px rgba(255, 223, 0, 0.4); }
    
    .markdown-section a { color: var(--heading-color); text-decoration: none; font-weight: 600; border-bottom: 1px dashed var(--heading-color); transition: all 0.2s ease; }
    .markdown-section a:hover { color: var(--accent-hover); border-bottom: 1px solid var(--accent-hover); text-shadow: 0 0 8px rgba(255, 30, 70, 0.4); }
    .markdown-section strong { color: #fff; text-shadow: 0 0 5px rgba(255, 255, 255, 0.2); }
    .markdown-section em { color: var(--star-color); }
    
    .markdown-section hr { border: none !important; border-bottom: 2px dashed rgba(255, 30, 70, 0.3) !important; margin: 30px 0 !important; }

    /* ================= BLOCS DE CODE (FIXÉS) ================= */
    .markdown-section pre {
      background-color: rgba(14, 2, 4, 0.85) !important; border: 1px solid var(--border-color) !important;
      border-left: 4px solid var(--accent-color) !important; border-radius: 8px !important;
      padding: 1.5rem !important; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4) !important;
      margin: 25px 0 !important; overflow: auto !important; backdrop-filter: blur(5px);
    }
    .markdown-section pre > code { background-color: transparent !important; color: #ffeff3 !important; padding: 0 !important; font-size: 0.9em !important; border-radius: 0 !important; display: block !important; }
    .markdown-section code { background-color: rgba(255, 30, 70, 0.15) !important; color: #ffb3c6 !important; border-radius: 4px !important; padding: 3px 6px !important; font-size: 0.9em !important; }

    /* Bouton copier le code */
    .docsify-copy-code-button { background: rgba(0,0,0,0.8) !important; color: #fff !important; border: 1px solid var(--border-color) !important; border-radius: 6px !important; transition: 0.3s; }
    .docsify-copy-code-button:hover { background: var(--accent-color) !important; border-color: var(--accent-color) !important; box-shadow: 0 0 10px rgba(255, 30, 70, 0.5) !important; }

    /* ================= CITATIONS ================= */
    .markdown-section blockquote {
      border-left: 4px solid var(--accent-color); background-color: rgba(255, 30, 70, 0.05);
      color: #ffb3c6; border-radius: 0 12px 12px 0; padding: 15px 20px; margin: 20px 0; backdrop-filter: blur(5px);
    }

    /* ================= TABLEAUX (FIXÉS) ================= */
    .markdown-section table {
      display: table !important; width: 100% !important; border-collapse: separate !important; border-spacing: 0 !important;
      margin: 25px 0 !important; border-radius: 10px !important; overflow: hidden !important;
      background-color: rgba(15, 2, 4, 0.6) !important; box-shadow: 0 0 0 1px var(--border-color) !important; 
    }
    .markdown-section table tr { background-color: transparent !important; transition: background-color 0.2s ease; }
    .markdown-section table tr:nth-child(2n) { background-color: rgba(20, 3, 6, 0.5) !important; }
    .markdown-section table tr:hover { background-color: rgba(255, 30, 70, 0.15) !important; }
    .markdown-section table th { background-color: rgba(255, 30, 70, 0.25) !important; color: #fff !important; font-weight: 700 !important; text-transform: uppercase !important; letter-spacing: 0.05em; padding: 14px 16px !important; border: none !important; border-bottom: 2px solid var(--accent-color) !important; text-align: left !important; }
    .markdown-section table td { border: none !important; border-bottom: 1px solid rgba(74, 13, 26, 0.4) !important; padding: 12px 16px !important; color: var(--text-color) !important; }
    .markdown-section table tr:last-child td { border-bottom: none !important; }

    /* ================= SCROLLBAR ================= */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); }
    ::-webkit-scrollbar-thumb { background: #4a0d1a; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

    /* ================= RESPONSIVE MOBILE ================= */
    @media screen and (max-width: 768px) {
      .content { left: 0 !important; width: 100vw !important; transition: transform 0.25s ease !important; }
      .markdown-section { padding: 80px 15px 25px 15px !important; } /* Padding top pour le bouton menu */
      .markdown-section h1 { font-size: 2rem; }
      .markdown-section h2 { font-size: 1.5rem; }
      .sidebar { background-color: rgba(14, 2, 4, 0.95) !important; }
      .markdown-section table { display: block !important; overflow-x: auto !important; white-space: nowrap !important; }
      
      /* Bouton Menu Mobile (Hamburger) */
      .sidebar-toggle {
        background: rgba(14, 2, 4, 0.9) !important; backdrop-filter: blur(10px) !important;
        border: 2px solid var(--accent-color) !important; border-radius: 50% !important;
        bottom: 20px !important; left: 20px !important; width: 50px !important; height: 50px !important;
        padding: 14px !important; box-shadow: 0 0 15px rgba(255, 30, 70, 0.5) !important;
        display: flex !important; flex-direction: column !important; justify-content: space-around !important; align-items: center !important; z-index: 9999 !important;
      }
      .sidebar-toggle .sidebar-toggle-button { padding: 0 !important; background: transparent !important; display: flex !important; flex-direction: column !important; justify-content: space-between !important; width: 100% !important; height: 100% !important; }
      .sidebar-toggle span { background: var(--accent-color) !important; width: 100% !important; height: 3px !important; margin: 0 !important; border-radius: 3px !important; display: block !important; }
    }
  </style>

  <!-- BALISE OÙ SERA INJECTÉ LE CSS DES THEMES DE DOSSIER (Custom) -->
  <style id="custom-folder-css"></style>
</head>
<body>
  
  <!-- BALISE OÙ SERA INJECTÉ LE HTML DES THEMES DE DOSSIER (Custom) -->
  <div id="custom-folder-html" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:-1;"></div>

  <!-- Calque d'animation de fond -->
  <div class="animated-background"></div>

  <div id="app">✨ Ouverture des archives...</div>

  <script>
    // --- MOTEUR D'INJECTION DE THEMES PAR DOSSIER ---
    const customCssTarget = document.getElementById('custom-folder-css');
    const customHtmlTarget = document.getElementById('custom-folder-html');
    let themeCache = {}; 
    
    // Fonction qui remonte les dossiers pour chercher un fichier "theme.html"
    async function loadFolderCustomTheme(filePath) {
      if (!filePath) return null;
      let parts = filePath.split('/');
      parts.pop(); // Retire le nom du fichier pour ne garder que le dossier
      
      while (parts.length > 0) {
        let folderPath = parts.join('/');
        let themeUrl = folderPath + '/theme.html';
        
        // Cache pour ne pas re-télécharger le fichier si on navigue dans le même dossier
        if (themeCache[themeUrl] !== undefined) {
          if (themeCache[themeUrl]) return themeCache[themeUrl];
        } else {
          try {
            let res = await fetch(themeUrl);
            if (res.ok) {
              let text = await res.text();
              themeCache[themeUrl] = text;
              return text; 
            } else {
              themeCache[themeUrl] = null;
            }
          } catch(e) {
            themeCache[themeUrl] = null;
          }
        }
        parts.pop(); // Remonte d'un dossier parent
      }
      return null; 
    }

    // --- CONFIGURATION DOCSIFY ---
    window.$docsify = {
      name: 'Legal Wiki',
      repo: '',
      
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md' // Empêche docsify de chercher une sidebar dans chaque sous-dossier
      },
      
      loadSidebar: true,
      subMaxLevel: 0, // N'affiche pas les titres H2/H3 dans la sidebar (garde une structure propre définie dans le _sidebar.md)
      auto2top: true, // Remonte en haut de la page au clic d'un lien
      
      search: {
        paths: 'auto',
        placeholder: '🔍 Rechercher...',
        noData: '❌ Aucun résultat.',
        depth: 3,
      },

      sidebarDisplayLevel: 1,

      plugins: [
        // ★ PLUGIN D'INJECTION DE THÈMES DOSSIERS ★
        function(hook, vm) {
          hook.beforeEach(function(content, next) {
            loadFolderCustomTheme(vm.route.file).then(customHtml => {
              if (customHtml) {
                // Parse le theme.html trouvé dans le dossier
                let parser = new DOMParser();
                let doc = parser.parseFromString(customHtml, 'text/html');
                
                // 1. Extraction et Injection du CSS (Les balises <style>)
                let extractedCss = '';
                doc.querySelectorAll('style').forEach(s => extractedCss += s.innerHTML + '\n');
                customCssTarget.innerHTML = extractedCss;
                
                // 2. Extraction et Injection du HTML (Les particules, fonds, etc.)
                customHtmlTarget.innerHTML = doc.body.innerHTML;
              } else {
                // Si on sort du dossier, on nettoie pour retrouver le style "Bordeaux" par défaut
                customCssTarget.innerHTML = '';
                customHtmlTarget.innerHTML = '';
              }
              next(content);
            });
          });
        }
      ]
    }
  </script>

  <!-- Docsify Core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  
  <!-- PLUGINS -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
