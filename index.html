<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Solus Wiki ★ Oshi no Ko</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.css" />

  <style>
    /* =========================================
       ★ SYSTÈME DE THÈMES (ICÔNES & NÉONS) ★
       ========================================= */
    :root {
      --theme-color: #ff55aa; --theme-dim: #550022; --bg-radial-center: #2a0a1a; --bg-main: #0a0105;
      --theme-icon: "★"; /* Icône par défaut */
    }

    /* Ai Hoshino (L'Étoile Absolue) */
    [data-theme='ai'] { --theme-color: #ff55aa; --theme-dim: #440a22; --bg-radial-center: #1f0510; --bg-main: #080103; --theme-icon: "★"; }
    
    /* Ruby Hoshino (L'Amour / La Passion) */
    [data-theme='ruby'] { --theme-color: #ff0044; --theme-dim: #44000a; --bg-radial-center: #200005; --bg-main: #050001; --theme-icon: "♥"; }
    
    /* Aqua Hoshino (L'Étoile Sombre / Vengeance) */
    [data-theme='aqua'] { --theme-color: #00eeff; --theme-dim: #002233; --bg-radial-center: #00111f; --bg-main: #000205; --theme-icon: "✦"; }
    
    /* Kana Arima (L'Ex-Reine / Baking Soda) */
    [data-theme='kana'] { --theme-color: #ffffff; --theme-dim: #66001a; --bg-radial-center: #220008; --bg-main: #050002; --theme-icon: "♔"; }
    
    /* Akane Kurokawa (Le Théâtre / L'Élégance) */
    [data-theme='akane'] { --theme-color: #5577ff; --theme-dim: #0a0a33; --bg-radial-center: #05051a; --bg-main: #010105; --theme-icon: "✿"; }
    
    /* Mem-cho (L'Idole Pop / Internet) */
    [data-theme='memcho'] { --theme-color: #ffcc00; --theme-dim: #443300; --bg-radial-center: #1a1400; --bg-main: #050400; --theme-icon: "♪"; }

    /* =========================================
       ★ FOND, SÉLECTION & SCROLLBAR ★
       ========================================= */
    body { 
      font-family: 'Poppins', sans-serif !important;
      background-color: var(--bg-main) !important;
      background-image: radial-gradient(circle at 50% -10%, var(--bg-radial-center) 0%, var(--bg-main) 70%) !important;
      background-attachment: fixed; color: #f0f0f0;
    }

    ::selection { background: var(--theme-color); color: #000; text-shadow: none; }

    #stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
    .star { position: absolute; color: var(--theme-color); opacity: 0; animation: twinkle linear infinite; text-shadow: 0 0 10px var(--theme-color); }
    @keyframes twinkle { 0% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.8; transform: scale(1.2); } 100% { opacity: 0; transform: scale(0.5); } }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: var(--theme-color); border-radius: 10px; box-shadow: inset 0 0 5px rgba(0,0,0,0.8); }

    /* =========================================
       ★ SIDEBAR (LOGE VIP) ★
       ========================================= */
    .sidebar { 
      background: rgba(5, 5, 8, 0.75) !important; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.03) !important;
      box-shadow: 5px 0 30px rgba(0,0,0,0.8); padding-top: 15px;
    }
    
    .sidebar h1 {
      font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 0 0 15px var(--theme-color);
      border-bottom: 2px solid var(--theme-color); padding-bottom: 15px; text-transform: uppercase;
    }

    .search input {
      background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.1) !important;
      color: #fff !important; border-radius: 30px !important; padding: 12px 15px !important; transition: all 0.3s !important;
    }
    .search input:focus { border-color: var(--theme-color) !important; box-shadow: 0 0 20px var(--theme-dim) !important; outline: none; }

    /* =========================================
       ★ MAGIE DES DOSSIERS (ICÔNES & FLÈCHES) ★
       ========================================= */
    .sidebar-nav ul li a {
      transition: all 0.3s ease; font-weight: 500; color: #888;
      padding: 8px 10px; display: block; border-left: 3px solid transparent;
    }
    .sidebar-nav ul li a:hover { color: #fff; background: rgba(255,255,255,0.02); }

    /* Flèche par défaut (Dossier Fermé) */
    .sidebar-nav li.collapse > a::before {
      content: "▶" !important; display: inline-block; margin-right: 12px; font-size: 10px;
      color: #444; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* DOSSIER OUVERT : Magie de l'icône ! */
    .sidebar-nav li.collapse:not(.close) > a {
      color: #fff !important; font-weight: 800 !important; letter-spacing: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.03), transparent);
      border-left: 3px solid var(--theme-color);
    }
    
    /* Remplacement de la flèche par l'icône du perso quand ouvert */
    .sidebar-nav li.collapse:not(.close) > a::before {
      content: var(--theme-icon) !important;
      font-size: 14px;
      color: var(--theme-color) !important;
      text-shadow: 0 0 10px var(--theme-color);
      transform: scale(1.2);
      animation: pulseIcon 1.5s infinite alternate;
    }

    @keyframes pulseIcon {
      0% { text-shadow: 0 0 5px var(--theme-color); transform: scale(1); }
      100% { text-shadow: 0 0 20px var(--theme-color), 0 0 30px var(--theme-color); transform: scale(1.2); }
    }

    /* Page active (Fichier) */
    .sidebar-nav ul li.active > a {
      color: var(--theme-color) !important; font-weight: 800;
      background: rgba(255,255,255,0.05); border-left: 3px solid var(--theme-color);
      box-shadow: inset 15px 0 25px -15px var(--theme-dim);
    }

    .app-sub-sidebar { margin-left: 22px !important; border-left: 1px dashed rgba(255,255,255,0.1); }
    .sidebar-nav .app-sub-sidebar li::before { display: none !important; }

    /* =========================================
       ★ CONTENU (SCRIPTS DE THÉÂTRE) ★
       ========================================= */
    .markdown-section h1 {
      font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 2px;
      text-shadow: 0 0 20px var(--theme-dim);
      border-bottom: 2px solid var(--theme-color); display: inline-block; padding-right: 50px;
    }
    .markdown-section a { color: var(--theme-color); font-weight: 800; text-decoration: none; transition: 0.3s; }
    .markdown-section a:hover { text-shadow: 0 0 10px var(--theme-color); }
    .markdown-section strong { color: var(--theme-color); font-weight: 900; text-shadow: 0 0 8px var(--theme-dim); }
    
    /* Citations style Script de scène */
    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color);
      background: linear-gradient(90deg, rgba(255,255,255,0.05), transparent);
      padding: 15px 20px; border-radius: 0 10px 10px 0; color: #ccc; font-style: italic;
      box-shadow: inset 20px 0 30px -20px var(--theme-dim);
    }

    .markdown-section pre { background: rgba(0,0,0,0.6) !important; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 8px; }
    code { background: var(--theme-dim) !important; color: #fff !important; border-radius: 4px; padding: 2px 6px; }

    /* Tableaux Fix */
    .markdown-section table { width: 100%; border-collapse: collapse; background: rgba(0, 0, 0, 0.4) !important; border: 1px solid var(--theme-dim) !important; border-radius: 8px; overflow: hidden; }
    .markdown-section table th { background-color: var(--theme-dim) !important; border-bottom: 2px solid var(--theme-color) !important; color: #fff !important; font-weight: 800; text-transform: uppercase; padding: 15px !important; }
    .markdown-section table td { border: 1px solid rgba(255, 255, 255, 0.05) !important; color: #ddd !important; padding: 12px !important; }
    .markdown-section table tr:nth-child(2n) { background-color: rgba(255, 255, 255, 0.02) !important; }
    .markdown-section table tr:nth-child(odd) { background-color: transparent !important; }

    /* =========================================
       ★ THEME PICKER (CONSOLE LUMIÈRE) ★
       ========================================= */
    #theme-picker {
      position: fixed; top: 15px; right: 25px; z-index: 1000;
      background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px);
      padding: 10px 20px; border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      display: flex; gap: 12px; align-items: center;
    }
    .theme-dot {
      width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .theme-dot:hover { transform: scale(1.4); border-color: #fff; box-shadow: 0 0 15px currentColor; }
    .dot-kana { border: 1px solid #66001a; } /* Fix visibilité Kana */

  </style>
</head>
<body>
  
  <div id="stars-container"></div>

  <div id="theme-picker">
    <span style="color:#fff; font-size:12px; font-weight:900; letter-spacing:2px; margin-right:8px; opacity: 0.8;">推し</span>
    <div class="theme-dot" style="background:#ff55aa; color:#ff55aa" onclick="setTheme('ai')" title="Ai Hoshino (L'Étoile)"></div>
    <div class="theme-dot" style="background:#ff0044; color:#ff0044" onclick="setTheme('ruby')" title="Ruby Hoshino (La Passion)"></div>
    <div class="theme-dot" style="background:#00eeff; color:#00eeff" onclick="setTheme('aqua')" title="Aqua Hoshino (La Vengeance)"></div>
    <div class="theme-dot dot-kana" style="background:#ffffff; color:#ffffff" onclick="setTheme('kana')" title="Kana Arima (La Reine Enfant)"></div>
    <div class="theme-dot" style="background:#5577ff; color:#5577ff" onclick="setTheme('akane')" title="Akane Kurokawa (Le Théâtre)"></div>
    <div class="theme-dot" style="background:#ffcc00; color:#ffcc00" onclick="setTheme('memcho')" title="Mem-cho (La Pop)"></div>
  </div>

  <div id="app">Mise en place de la scène...</div>

  <script>
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('solus-wiki-theme', theme);
      if (window.$docsify) window.$docsify.themeColor = getComputedStyle(document.documentElement).getPropertyValue('--theme-color').trim();
      generateStars();
    }
    const saved = localStorage.getItem('solus-wiki-theme') || 'ai';
    setTheme(saved);

    function generateStars() {
      const container = document.getElementById('stars-container');
      container.innerHTML = '';
      
      // On récupère l'icône du perso pour en faire quelques unes dans le fond !
      const currentIcon = getComputedStyle(document.documentElement).getPropertyValue('--theme-icon').replace(/["']/g, '').trim();
      
      for (let i = 0; i < 40; i++) {
        let star = document.createElement('div');
        star.className = 'star';
        // 1 chance sur 4 que l'étoile de fond soit l'icône du perso (le reste = étoiles normales)
        star.innerHTML = Math.random() > 0.75 ? currentIcon : (Math.random() > 0.5 ? '✦' : '✧'); 
        
        star.style.left = Math.random() * 100 + 'vw';
        star.style.top = Math.random() * 100 + 'vh';
        star.style.fontSize = (Math.random() * 12 + 4) + 'px';
        star.style.animationDuration = (Math.random() * 5 + 2) + 's';
        star.style.animationDelay = (Math.random() * 5) + 's';
        container.appendChild(star);
      }
    }
    window.onload = generateStars;

    window.$docsify = {
      name: 'Solus Wiki <span>★</span>',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      sidebarDisplayLevel: 1, 
      auto2top: true,
      search: {
        placeholder: 'Rechercher un secret...',
        noData: 'Aucune rumeur trouvée.'
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
