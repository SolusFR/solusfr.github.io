<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Wiki - Oshi no Ko</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Base de Docsify -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    /* =========================================
       THÈME OSHI NO KO (Variables personnalisables)
       ========================================= */
    :root {
      /* Couleurs par défaut (Thème Ai Hoshino) */
      --bg-color: #0b0510;
      --text-color: #fce8f8;
      --theme-color: #ff2a85; /* Rose néon */
      --sidebar-bg: rgba(18, 9, 28, 0.7);
      --bg-image: url('https://images.unsplash.com/photo-1534796636918-9b4580518835?q=80&w=2000'); /* Ciel étoilé par défaut */
      
      /* Variables Docsify natives */
      --docsifytabs-border-color: var(--theme-color);
      --docsifytabs-tab-highlight-color: var(--theme-color);
    }

    /* Fond et texte global */
    body {
      background-color: var(--bg-color) !important;
      background-image: var(--bg-image) !important;
      background-size: cover !important;
      background-position: center !important;
      background-attachment: fixed !important;
      color: var(--text-color) !important;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    /* Ombre pour la lisibilité sur fond d'image */
    .markdown-section {
      background: rgba(11, 5, 16, 0.85);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255, 42, 133, 0.2);
      backdrop-filter: blur(10px);
      max-width: 900px;
      margin-top: 20px;
    }

    .markdown-section h1, .markdown-section h2, .markdown-section h3, .markdown-section h4 {
      color: var(--theme-color) !important;
      text-shadow: 0 0 10px var(--theme-color);
    }

    .markdown-section p, .markdown-section li {
      color: var(--text-color) !important;
    }

    .markdown-section a {
      color: var(--theme-color);
      font-weight: bold;
      transition: text-shadow 0.3s ease;
    }

    .markdown-section a:hover {
      text-shadow: 0 0 8px var(--theme-color);
    }

    /* Sidebar Glassmorphism */
    .sidebar {
      background: var(--sidebar-bg) !important;
      backdrop-filter: blur(15px);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }
    .sidebar h1 a {
      color: var(--theme-color) !important;
      text-shadow: 0 0 15px var(--theme-color);
      font-size: 1.5rem;
    }
    .sidebar ul li a {
      color: var(--text-color) !important;
    }
    .sidebar ul li a:hover, .sidebar ul li.active > a {
      color: var(--theme-color) !important;
      text-shadow: 0 0 5px var(--theme-color);
    }
    .sidebar-toggle {
      background: rgba(0,0,0,0.5) !important;
    }

    /* =========================================
       PANNEAU DE PERSONNALISATION
       ========================================= */
    #theme-panel {
      position: fixed;
      top: 20px;
      right: -320px;
      width: 280px;
      background: rgba(20, 10, 30, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid var(--theme-color);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
      transition: right 0.3s ease-in-out;
      z-index: 9999;
      color: white;
    }
    #theme-panel.open {
      right: 20px;
    }
    #theme-toggle-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--theme-color);
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      cursor: pointer;
      box-shadow: 0 0 15px var(--theme-color);
      z-index: 10000;
      color: white;
      font-size: 24px;
      transition: transform 0.3s;
    }
    #theme-toggle-btn:hover {
      transform: scale(1.1) rotate(45deg);
    }
    .theme-group {
      margin-bottom: 15px;
    }
    .theme-group label {
      display: block;
      font-size: 12px;
      margin-bottom: 5px;
      color: #aaa;
    }
    .theme-group input[type="color"] {
      width: 100%;
      height: 40px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .theme-group input[type="text"] {
      width: 100%;
      padding: 8px;
      background: rgba(0,0,0,0.5);
      border: 1px solid #555;
      color: white;
      border-radius: 5px;
      box-sizing: border-box;
    }
    .presets {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .preset-btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      color: white;
    }
    .btn-ai { background: #ff2a85; }
    .btn-aqua { background: #2a85ff; }
    .btn-ruby { background: #ff2a2a; }

    /* Scrollbar personnalisée */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); }
    ::-webkit-scrollbar-thumb { background: var(--theme-color); border-radius: 4px; }
  </style>
</head>
<body>

  <!-- Bouton pour ouvrir le menu de thème -->
  <button id="theme-toggle-btn">✨</button>

  <!-- Menu de personnalisation -->
  <div id="theme-panel">
    <h3 style="margin-top:0; color: var(--theme-color); text-shadow: 0 0 5px var(--theme-color);">Personnaliser le thème</h3>
    
    <div class="theme-group">
      <label>Couleur Principale (Thème)</label>
      <input type="color" id="color-theme" value="#ff2a85">
    </div>
    <div class="theme-group">
      <label>Couleur du Texte</label>
      <input type="color" id="color-text" value="#fce8f8">
    </div>
    <div class="theme-group">
      <label>Couleur de Fond</label>
      <input type="color" id="color-bg" value="#0b0510">
    </div>
    <div class="theme-group">
      <label>Image de fond (URL web)</label>
      <input type="text" id="url-bg" placeholder="https://lien-vers-image.png">
    </div>
    <div class="theme-group">
      <label>Thèmes Prédéfinis (Oshi no Ko)</label>
      <div class="presets">
        <button class="preset-btn btn-ai" onclick="applyPreset('ai')">Ai</button>
        <button class="preset-btn btn-aqua" onclick="applyPreset('aqua')">Aqua</button>
        <button class="preset-btn btn-ruby" onclick="applyPreset('ruby')">Ruby</button>
      </div>
    </div>
    <button onclick="resetTheme()" style="width: 100%; padding: 10px; margin-top: 10px; background: transparent; border: 1px solid white; color: white; cursor: pointer;">Réinitialiser</button>
  </div>

  <div id="app">Chargement du monde d'Oshi no Ko...</div>

  <script>
    // Configuration de Docsify
    window.$docsify = {
      name: 'Wiki Oshi no Ko',
      basePath: 'wiki/', // Va chercher les fichiers dans le dossier "wiki" à côté de l'index
      repo: '', // Ajoute ton lien GitHub ici si tu veux la petite bulle en haut à droite
      loadSidebar: true, // Obligatoire pour GitHub Pages (cherche wiki/_sidebar.md)
      subMaxLevel: 3,
      auto2top: true,
      search: 'auto', // Active la barre de recherche (nécessite le plugin search ci-dessous)
      themeColor: '#ff2a85' // Sera écrasé par notre script dynamique
    }
  </script>

  <!-- Plugins Docsify -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

  <!-- SCRIPTS DE GESTION DU THÈME -->
  <script>
    // 1. Définition des éléments et variables
    const root = document.documentElement;
    const panel = document.getElementById('theme-panel');
    const toggleBtn = document.getElementById('theme-toggle-btn');
    
    const inputs = {
      theme: document.getElementById('color-theme'),
      text: document.getElementById('color-text'),
      bg: document.getElementById('color-bg'),
      bgUrl: document.getElementById('url-bg')
    };

    const defaultTheme = {
      theme: '#ff2a85',
      text: '#fce8f8',
      bg: '#0b0510',
      bgUrl: 'https://images.unsplash.com/photo-1534796636918-9b4580518835?q=80&w=2000'
    };

    const presets = {
      ai: defaultTheme,
      aqua: {
        theme: '#2a85ff', text: '#e8f4fc', bg: '#050a10', bgUrl: 'https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?q=80&w=2000'
      },
      ruby: {
        theme: '#ff2a2a', text: '#fce8e8', bg: '#100505', bgUrl: 'https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=2000'
      }
    };

    // 2. Ouvrir / Fermer le panneau
    toggleBtn.addEventListener('click', () => {
      panel.classList.toggle('open');
    });

    // 3. Appliquer les couleurs au CSS
    function applyColors(colors) {
      root.style.setProperty('--theme-color', colors.theme);
      root.style.setProperty('--text-color', colors.text);
      root.style.setProperty('--bg-color', colors.bg);
      
      if(colors.bgUrl) {
        root.style.setProperty('--bg-image', `url('${colors.bgUrl}')`);
      } else {
        root.style.setProperty('--bg-image', 'none');
      }

      // Mettre à jour les inputs visuellement
      inputs.theme.value = colors.theme;
      inputs.text.value = colors.text;
      inputs.bg.value = colors.bg;
      inputs.bgUrl.value = colors.bgUrl;
    }

    // 4. Sauvegarder dans le navigateur (Local Storage = Cookies en mieux)
    function saveTheme(colors) {
      localStorage.setItem('oshiTheme', JSON.stringify(colors));
      applyColors(colors);
    }

    // 5. Charger le thème au lancement
    function loadTheme() {
      const saved = localStorage.getItem('oshiTheme');
      if (saved) {
        applyColors(JSON.parse(saved));
      } else {
        applyColors(defaultTheme);
      }
    }

    // 6. Écouter les changements des utilisateurs dans le panneau
    Object.keys(inputs).forEach(key => {
      inputs[key].addEventListener('input', () => {
        const newTheme = {
          theme: inputs.theme.value,
          text: inputs.text.value,
          bg: inputs.bg.value,
          bgUrl: inputs.bgUrl.value
        };
        saveTheme(newTheme);
      });
    });

    // 7. Fonctions pour les boutons
    function applyPreset(name) {
      saveTheme(presets[name]);
    }

    function resetTheme() {
      localStorage.removeItem('oshiTheme');
      applyColors(defaultTheme);
    }

    // Lancer au démarrage
    loadTheme();
  </script>
</body>
</html>
