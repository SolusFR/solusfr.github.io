<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Wiki - Oshi no Ko</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- 1. POLICES STYLE ANIME -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  
  <!-- 2. CSS DOCSIFY + PLUGIN DOSSIERS -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />

  <style>
    /* =========================================
       THÈME OSHI NO KO (DESIGN ULTRA)
       ========================================= */
    :root {
      /* Couleurs par défaut (Ai Hoshino) */
      --theme-color: #ff2a85;
      --theme-glow: rgba(255, 42, 133, 0.5);
      --bg-color: #0b0510;
      --text-color: #fce8f8;
      --sidebar-bg: rgba(15, 8, 25, 0.85);
      --card-bg: rgba(25, 12, 35, 0.7);
      --bg-image: url('https://images.unsplash.com/photo-1534796636918-9b4580518835?q=80&w=2000');
    }

    /* FOND ET CORPS */
    body {
      background-color: var(--bg-color) !important;
      background-image: var(--bg-image) !important;
      background-size: cover !important;
      background-position: center !important;
      background-attachment: fixed !important;
      color: var(--text-color) !important;
      font-family: 'Quicksand', sans-serif;
    }
    /* Filtre sombre par dessus l'image */
    body::after {
      content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle, transparent 40%, var(--bg-color) 100%);
      pointer-events: none; z-index: -1;
    }

    /* CONTENU (CARTE) */
    .content { padding-top: 40px; }
    .markdown-section {
      background: var(--card-bg);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border-radius: 15px; padding: 40px !important;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      margin: 0 auto 40px auto; max-width: 950px;
    }
    .markdown-section h1, .markdown-section h2 {
      font-family: 'Poppins', sans-serif; color: var(--theme-color) !important;
      text-shadow: 0 0 15px var(--theme-glow); border-bottom: 2px solid rgba(255,255,255,0.1);
    }
    .markdown-section a {
      color: var(--theme-color); font-weight: bold; text-decoration: none;
      border-bottom: 1px dashed var(--theme-color); transition: 0.3s;
    }
    .markdown-section a:hover {
      background: var(--theme-glow); color: white !important;
    }

    /* BARRE LATÉRALE (SIDEBAR) */
    .sidebar {
      background: var(--sidebar-bg) !important;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255,255,255,0.05);
      width: 300px;
    }
    .app-name-link {
      font-family: 'Poppins', sans-serif; font-weight: 900;
      color: var(--theme-color) !important; text-shadow: 0 0 10px var(--theme-glow);
    }
    
    /* GESTION DU PLUGIN SIDEBAR COLLAPSE (DOSSIERS) */
    .sidebar-nav ul li { margin: 2px 0; }
    .sidebar-nav ul li a {
      color: #ddd !important; transition: 0.2s; border: none !important; font-size: 15px;
    }
    .sidebar-nav ul li a:hover {
      color: var(--theme-color) !important; text-shadow: 0 0 5px var(--theme-glow);
    }
    /* Dossier/Fichier actif */
    .sidebar-nav li.active > a {
      color: white !important; background: linear-gradient(90deg, var(--theme-color), transparent);
      border-left: 3px solid white; padding-left: 10px;
    }
    /* Icones de dossiers */
    .app-sub-sidebar li:before { display: none; } 
    .folder { cursor: pointer; color: var(--text-color); font-weight: bold; }

    /* MENU PARAMÈTRES */
    #theme-panel {
      position: fixed; top: 20px; right: -320px; width: 280px;
      background: rgba(10, 5, 15, 0.95); backdrop-filter: blur(25px);
      border: 1px solid var(--theme-color); border-radius: 15px; padding: 25px;
      box-shadow: 0 0 50px rgba(0,0,0,0.8); z-index: 9999; color: white;
      transition: right 0.4s;
    }
    #theme-panel.open { right: 20px; }
    #theme-toggle-btn {
      position: fixed; top: 20px; right: 20px; z-index: 10000;
      width: 50px; height: 50px; border-radius: 50%; border: none;
      background: var(--theme-color); color: white; font-size: 24px; cursor: pointer;
      box-shadow: 0 0 20px var(--theme-glow); transition: 0.3s;
    }
    #theme-toggle-btn:hover { transform: scale(1.1) rotate(90deg); }
    
    .theme-group { margin-bottom: 15px; }
    .theme-group input[type="color"] { width: 100%; border: none; background: transparent; cursor: pointer; height: 30px;}
    .theme-group input[type="text"] { width: 100%; padding: 5px; background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; }
    .presets { display: flex; gap: 5px; margin-top: 5px; }
    .preset-btn { flex: 1; padding: 5px; border:none; cursor:pointer; color:white; font-weight:bold; }
  </style>
</head>
<body>

  <!-- BOUTON & MENU SETTINGS -->
  <button id="theme-toggle-btn">✨</button>
  <div id="theme-panel">
    <h3 style="margin:0 0 15px 0; color:var(--theme-color); text-align:center;">Costume de Scène</h3>
    <div class="theme-group"><label>Thème</label><input type="color" id="color-theme"></div>
    <div class="theme-group"><label>Texte</label><input type="color" id="color-text"></div>
    <div class="theme-group"><label>Fond</label><input type="color" id="color-bg"></div>
    <div class="theme-group"><label>Image URL</label><input type="text" id="url-bg"></div>
    <div class="presets">
      <button class="preset-btn" style="background:#ff2a85" onclick="applyPreset('ai')">Ai</button>
      <button class="preset-btn" style="background:#2a85ff" onclick="applyPreset('aqua')">Aqua</button>
      <button class="preset-btn" style="background:#ff2a2a" onclick="applyPreset('ruby')">Ruby</button>
    </div>
    <button onclick="resetTheme()" style="width:100%; margin-top:10px; background:transparent; border:1px solid #666; color:#ccc; cursor:pointer;">Reset</button>
  </div>

  <div id="app">Chargement...</div>

  <!-- CONFIGURATION SIMPLE (COMME TON EXEMPLE) -->
  <script>
    window.$docsify = {
      name: 'Oshi no Ko Wiki',
      
      // On garde juste ça pour dire que les fichiers sont dans le dossier wiki
      basePath: '/wiki/',
      
      // Config standard
      homepage: 'README.md',
      loadSidebar: true, // Va chercher _sidebar.md dans wiki/ automatiquement
      subMaxLevel: 2,
      auto2top: true,
      
      // Config Recherche
      search: {
        placeholder: 'Rechercher...',
        noData: 'Rien trouvé.',
        depth: 6
      },

      // Config Plugin Dossiers (Sidebar Collapse)
      sidebarDisplayLevel: 1, // 1 = Fermé par défaut, clique pour ouvrir
    }
  </script>

  <!-- SCRIPTS -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  
  <!-- LE PLUGIN QUI TE MANQUAIT -->
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>

  <!-- SCRIPT THEME (COOKIES) -->
  <script>
    const root = document.documentElement, panel = document.getElementById('theme-panel'), toggle = document.getElementById('theme-toggle-btn');
    const inputs = { theme: document.getElementById('color-theme'), text: document.getElementById('color-text'), bg: document.getElementById('color-bg'), bgUrl: document.getElementById('url-bg') };
    const presets = {
      ai: { theme: '#ff2a85', text: '#fce8f8', bg: '#0b0510', bgUrl: 'https://images.unsplash.com/photo-1534796636918-9b4580518835?q=80&w=2000' },
      aqua: { theme: '#2a85ff', text: '#e8f4fc', bg: '#050a10', bgUrl: 'https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?q=80&w=2000' },
      ruby: { theme: '#ff2a2a', text: '#fce8e8', bg: '#100505', bgUrl: 'https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=2000' }
    };
    
    toggle.addEventListener('click', () => panel.classList.toggle('open'));

    function apply(c) {
      root.style.setProperty('--theme-color', c.theme);
      root.style.setProperty('--theme-glow', c.theme + '80'); // Ajoute transparence
      root.style.setProperty('--text-color', c.text);
      root.style.setProperty('--bg-color', c.bg);
      root.style.setProperty('--bg-image', c.bgUrl ? `url('${c.bgUrl}')` : 'none');
      inputs.theme.value = c.theme; inputs.text.value = c.text; inputs.bg.value = c.bg; inputs.bgUrl.value = c.bgUrl;
    }
    
    function save(c) { localStorage.setItem('oshiTheme', JSON.stringify(c)); apply(c); }
    Object.keys(inputs).forEach(k => inputs[k].addEventListener('input', () => save({ theme: inputs.theme.value, text: inputs.text.value, bg: inputs.bg.value, bgUrl: inputs.bgUrl.value })));
    function applyPreset(n) { save(presets[n]); }
    function resetTheme() { localStorage.removeItem('oshiTheme'); apply(presets.ai); }
    
    const saved = localStorage.getItem('oshiTheme');
    apply(saved ? JSON.parse(saved) : presets.ai);
  </script>
</body>
</html>
