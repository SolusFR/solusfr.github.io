<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Wiki - Oshi no Ko</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />

  <style>
    /* VARIABLES THÈME OSHI NO KO */
    :root {
      --theme-color: #ff2a85;
      --theme-glow: rgba(255, 42, 133, 0.5);
      --bg-color: #0b0510;
      --text-color: #fce8f8;
      --sidebar-bg: rgba(15, 8, 25, 0.9);
      --card-bg: rgba(25, 12, 35, 0.7);
      --bg-image: url('https://images.unsplash.com/photo-1534796636918-9b4580518835?q=80&w=2000');
    }

    body {
      background-color: var(--bg-color) !important;
      background-image: var(--bg-image) !important;
      background-size: cover !important;
      background-attachment: fixed !important;
      color: var(--text-color) !important;
      font-family: 'Quicksand', sans-serif;
    }
    
    /* Carte de contenu */
    .markdown-section {
      background: var(--card-bg);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border-radius: 15px; padding: 40px !important;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      max-width: 950px; margin: 0 auto;
    }
    .markdown-section h1, .markdown-section h2 {
      font-family: 'Poppins', sans-serif; color: var(--theme-color) !important;
      text-shadow: 0 0 15px var(--theme-glow); border-bottom: 2px solid rgba(255,255,255,0.1);
    }
    .markdown-section a {
      color: var(--theme-color); font-weight: bold; text-decoration: none;
    }

    /* Sidebar */
    .sidebar {
      background: var(--sidebar-bg) !important;
      border-right: 1px solid rgba(255,255,255,0.1);
      width: 300px;
    }
    /* Liens Sidebar */
    .sidebar-nav ul li a { color: #ddd !important; border: none !important; font-size: 14px; transition:0.2s;}
    .sidebar-nav ul li a:hover { color: var(--theme-color) !important; transform: translateX(5px); }
    .sidebar-nav li.active > a { color: white !important; font-weight:bold; border-left: 3px solid var(--theme-color); padding-left:10px; }
    
    /* Settings Panel */
    #theme-panel {
      position: fixed; top: 20px; right: -320px; width: 280px;
      background: rgba(10, 5, 15, 0.95); border: 1px solid var(--theme-color); 
      border-radius: 15px; padding: 20px; z-index: 9999; color: white; transition: 0.4s;
    }
    #theme-panel.open { right: 20px; }
    #theme-toggle-btn {
      position: fixed; top: 20px; right: 20px; z-index: 10000;
      width: 50px; height: 50px; border-radius: 50%; border: none;
      background: var(--theme-color); color: white; font-size: 24px; cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="theme-toggle-btn">✨</button>
  <div id="theme-panel">
    <h3 style="margin:0 0 10px 0; color:var(--theme-color); text-align:center;">Costume</h3>
    <input type="color" id="color-theme" style="width:100%; margin-bottom:10px;">
    <button onclick="resetTheme()" style="width:100%">Reset</button>
  </div>

  <div id="app">Chargement...</div>

  <script>
    window.$docsify = {
      name: 'Oshi no Ko Wiki',
      
      // ON ENLÈVE LE BASEPATH ! 
      // Comme le sidebar est à la racine, plus besoin de basepath compliqué.
      // Le robot a déjà mis "wiki/" dans les liens du menu.
      
      homepage: 'wiki/README.md', // On pointe manuellement vers l'accueil
      loadSidebar: true,          // Cherche _sidebar.md à côté de index.html (Parfait !)
      
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md' // Sécurité : force le menu racine partout
      },

      subMaxLevel: 2,
      auto2top: true,
      sidebarDisplayLevel: 1, // Plugin dossiers
      search: { placeholder: 'Rechercher...', noData: 'Rien.' }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>

  <!-- Script Thème simplifié pour éviter les bugs -->
  <script>
    const root = document.documentElement, panel = document.getElementById('theme-panel');
    document.getElementById('theme-toggle-btn').onclick = () => panel.classList.toggle('open');
    const colorInput = document.getElementById('color-theme');

    function apply(color) {
      if(!color) return;
      root.style.setProperty('--theme-color', color);
      root.style.setProperty('--theme-glow', color + '80');
      colorInput.value = color;
      localStorage.setItem('oshiThemeSimple', color);
    }
    
    colorInput.oninput = (e) => apply(e.target.value);
    function resetTheme() { apply('#ff2a85'); }
    apply(localStorage.getItem('oshiThemeSimple') || '#ff2a85');
  </script>
</body>
</html>
