<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Solus Wiki ★ Oshi no Ko</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Police Poppins pour le côté Pop/Moderne -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.css" />

  <style>
    /* =========================================
       ★ SYSTÈME DE THÈMES (OSHI NO KO) ★
       ========================================= */
    :root {
      --theme-color: #ff55aa; 
      --theme-dim: #550022;
      --bg-radial-center: #2a0a1a;
      --bg-main: #0a0105;
      --text-color: #f0f0f0;
    }

    /* B-Komachi - Ai (Rose Néon) */
    [data-theme='ai'] { 
      --theme-color: #ff55aa; --theme-dim: #440a22;
      --bg-radial-center: #1f0510; --bg-main: #080103;
    }
    /* B-Komachi - Ruby (Rouge Intense) */
    [data-theme='ruby'] { 
      --theme-color: #ff0044; --theme-dim: #44000a;
      --bg-radial-center: #200005; --bg-main: #050001;
    }
    /* Acteur - Aqua (Cyan Électrique) */
    [data-theme='aqua'] { 
      --theme-color: #00eeff; --theme-dim: #002233;
      --bg-radial-center: #00111f; --bg-main: #000205;
    }
    /* B-Komachi - Kana (Blanc/Crimson - Baking Soda) */
    [data-theme='kana'] { 
      --theme-color: #ffffff; --theme-dim: #66001a;
      --bg-radial-center: #220008; --bg-main: #050002;
    }
    /* Actrice - Akane (Bleu Profond/Violet) */
    [data-theme='akane'] { 
      --theme-color: #5577ff; --theme-dim: #0a0a33;
      --bg-radial-center: #05051a; --bg-main: #010105;
    }
    /* B-Komachi - Mem-cho (Jaune/Or) */
    [data-theme='memcho'] { 
      --theme-color: #ffcc00; --theme-dim: #443300;
      --bg-radial-center: #1a1400; --bg-main: #050400;
    }

    /* =========================================
       ★ FOND ET AMBIANCE SCÈNE ★
       ========================================= */
    body { 
      font-family: 'Poppins', sans-serif !important;
      background-color: var(--bg-main) !important;
      background-image: radial-gradient(circle at 50% -10%, var(--bg-radial-center) 0%, var(--bg-main) 70%) !important;
      background-attachment: fixed;
      color: var(--text-color);
    }

    /* Particules d'étoiles/lumières en fond */
    #stars-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: -1;
    }
    .star {
      position: absolute; color: var(--theme-color);
      opacity: 0; animation: twinkle linear infinite;
      text-shadow: 0 0 10px var(--theme-color);
    }
    @keyframes twinkle {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.8; transform: scale(1.2); }
      100% { opacity: 0; transform: scale(0.5); }
    }

    /* Scrollbar Style Idol */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { 
      background: var(--theme-color); 
      border-radius: 10px; 
      box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
    }

    /* =========================================
       ★ SIDEBAR (LOGE VIP & DOSSIERS) ★
       ========================================= */
    .sidebar { 
      background: rgba(5, 5, 8, 0.8) !important; 
      backdrop-filter: blur(15px); /* Effet verre dépoli */
      border-right: 1px solid rgba(255, 255, 255, 0.05) !important;
      padding-top: 15px;
      box-shadow: 5px 0 25px rgba(0,0,0,0.5);
    }
    
    .sidebar h1 {
      font-weight: 900; letter-spacing: 2px; color: #fff;
      text-shadow: 0 0 15px var(--theme-color);
      border-bottom: 2px solid var(--theme-color);
      padding-bottom: 15px; text-transform: uppercase;
    }

    /* Search Bar améliorée */
    .search { border-bottom: none !important; margin-bottom: 20px; }
    .search input {
      background: rgba(255,255,255,0.05) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      color: #fff !important; border-radius: 20px !important;
      padding: 10px 15px !important; transition: all 0.3s !important;
    }
    .search input:focus {
      border-color: var(--theme-color) !important;
      box-shadow: 0 0 15px var(--theme-dim) !important;
    }

    /* --- MAGIE DES DOSSIERS (OPEN/CLOSE) --- */
    
    /* Retire la flèche par défaut du plugin collapse */
    .sidebar-nav li.collapse > a::before { display: none !important; }

    /* Style de base des liens */
    .sidebar-nav ul li a {
      transition: all 0.3s ease;
      font-weight: 400; color: #aaa;
      padding: 6px 10px; border-radius: 0 20px 20px 0;
      margin-right: 15px; border-left: 2px solid transparent;
    }
    .sidebar-nav ul li a:hover { color: #fff; background: rgba(255,255,255,0.05); }

    /* 1. DOSSIER FERMÉ (Gris, flèche droite) */
    .sidebar-nav li.collapse.close > a {
      color: #888 !important; font-weight: 600;
    }
    .sidebar-nav li.collapse.close > a::after {
      content: " ▷"; float: right; font-size: 10px; margin-top: 5px; opacity: 0.5;
    }

    /* 2. DOSSIER OUVERT (Illuminé, flèche bas) */
    .sidebar-nav li.collapse:not(.close) > a {
      color: #fff !important; font-weight: 800 !important; letter-spacing: 1px;
      text-shadow: 0 0 10px var(--theme-color);
      background: linear-gradient(90deg, var(--theme-dim), transparent);
      border-left: 3px solid var(--theme-color);
    }
    .sidebar-nav li.collapse:not(.close) > a::after {
      content: " ▼"; float: right; font-size: 10px; margin-top: 5px;
      color: var(--theme-color); text-shadow: 0 0 10px var(--theme-color);
    }

    /* 3. FICHIER ACTIF (Celui qu'on lit) */
    .sidebar-nav ul li.active > a {
      color: var(--theme-color) !important; font-weight: 800;
      background: rgba(255,255,255,0.05);
    }

    /* Ligne pointillée pour les sous-dossiers */
    .app-sub-sidebar { margin-left: 10px !important; border-left: 1px dashed rgba(255,255,255,0.1); }

    /* =========================================
       ★ CONTENU & TABLEAUX ★
       ========================================= */
    .markdown-section h1 {
      font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 2px;
      text-shadow: 0 0 20px var(--theme-dim);
      border-bottom: 2px solid var(--theme-color);
      display: inline-block; padding-right: 50px;
    }
    .markdown-section h2, .markdown-section h3 { color: #fff; }
    .markdown-section a { color: var(--theme-color); font-weight: 800; text-decoration: none; }
    .markdown-section strong { color: var(--theme-color); text-shadow: 0 0 8px var(--theme-dim); }
    
    .markdown-section pre { background: rgba(0,0,0,0.5) !important; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); }
    code { background: var(--theme-dim) !important; color: #fff !important; }

    /* --- FIX TABLEAUX (Anti-Aveuglement) --- */
    .markdown-section table {
      width: 100%; border-collapse: collapse;
      background: rgba(0, 0, 0, 0.4) !important; 
      border: 1px solid var(--theme-dim) !important;
    }
    .markdown-section table th {
      background-color: var(--theme-dim) !important; border: 1px solid var(--theme-color) !important;
      color: #fff !important; font-weight: 800; text-transform: uppercase; padding: 15px !important;
    }
    .markdown-section table td {
      border: 1px solid rgba(255, 255, 255, 0.1) !important; color: #ddd !important; padding: 12px !important;
    }
    .markdown-section table tr:nth-child(2n) { background-color: rgba(255, 255, 255, 0.02) !important; }
    .markdown-section table tr:nth-child(odd) { background-color: transparent !important; }
    .markdown-section table tr:hover { background-color: rgba(255, 255, 255, 0.05) !important; }

    /* =========================================
       ★ THEME PICKER (PANNEAU DE CONTRÔLE) ★
       ========================================= */
    #theme-picker {
      position: fixed; top: 15px; right: 25px; z-index: 1000;
      background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px);
      padding: 8px 15px; border-radius: 50px;
      border: 1px solid var(--theme-color);
      box-shadow: 0 0 15px var(--theme-dim);
      display: flex; gap: 8px; align-items: center;
    }
    .theme-dot {
      width: 16px; height: 16px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: all 0.3s;
    }
    .theme-dot:hover { transform: scale(1.5); border-color: #fff; box-shadow: 0 0 12px currentColor; }
    
    /* Contour blanc pour la couleur de Kana pour qu'on la voie */
    .dot-kana { border: 1px solid #66001a; }

  </style>
</head>
<body>
  
  <div id="stars-container"></div>

  <!-- LE SÉLECTEUR DE PERSONNAGES COMPLET -->
  <div id="theme-picker">
    <span style="color:#fff; font-size:10px; font-weight:900; letter-spacing:1px; margin-right:5px;">推し</span>
    <div class="theme-dot" style="background:#ff55aa; color:#ff55aa" onclick="setTheme('ai')" title="Ai Hoshino"></div>
    <div class="theme-dot" style="background:#ff0044; color:#ff0044" onclick="setTheme('ruby')" title="Ruby Hoshino"></div>
    <div class="theme-dot" style="background:#00eeff; color:#00eeff" onclick="setTheme('aqua')" title="Aqua Hoshino"></div>
    <div class="theme-dot dot-kana" style="background:#ffffff; color:#ffffff" onclick="setTheme('kana')" title="Kana Arima"></div>
    <div class="theme-dot" style="background:#5577ff; color:#5577ff" onclick="setTheme('akane')" title="Akane Kurokawa"></div>
    <div class="theme-dot" style="background:#ffcc00; color:#ffcc00" onclick="setTheme('memcho')" title="Mem-cho"></div>
  </div>

  <div id="app">Chargement des coulisses...</div>

  <script>
    // --- Système de Thèmes ---
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('solus-wiki-theme', theme);
      if (window.$docsify) window.$docsify.themeColor = getComputedStyle(document.documentElement).getPropertyValue('--theme-color').trim();
      generateStars();
    }
    const saved = localStorage.getItem('solus-wiki-theme') || 'ai';
    setTheme(saved);

    // --- Générateur d'ambiance (Lumières/Étoiles) ---
    function generateStars() {
      const container = document.getElementById('stars-container');
      container.innerHTML = '';
      const starCount = 40;
      for (let i = 0; i < starCount; i++) {
        let star = document.createElement('div');
        star.className = 'star';
        // Alternance entre étoiles et losanges pour le style
        star.innerHTML = Math.random() > 0.5 ? '✦' : '✧'; 
        star.style.left = Math.random() * 100 + 'vw';
        star.style.top = Math.random() * 100 + 'vh';
        star.style.fontSize = (Math.random() * 12 + 4) + 'px';
        star.style.animationDuration = (Math.random() * 4 + 2) + 's';
        star.style.animationDelay = (Math.random() * 5) + 's';
        container.appendChild(star);
      }
    }
    window.onload = generateStars;

    // --- Configuration Docsify ---
    window.$docsify = {
      name: 'Solus Wiki <span>★</span>',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      sidebarDisplayLevel: 1, 
      auto2top: true,
      search: {
        placeholder: 'Rechercher un secret...',
        noData: 'Aucune rumeur trouvée.'
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Le plugin Collapse indispensable pour les dossiers -->
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
