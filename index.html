<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Solus Wiki ★ Oshi no Ko</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Polices : Poppins (Moderne), Fira Code (Code), Playfair (Élégant pour Kana) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.css" />

  <style>
    /* =========================================
       ★ VARIABLES GLOBALES DE BASE ★
       ========================================= */
    :root {
      --sidebar-width: 300px; 
      --ui-radius: 12px;
      --ui-border: 1px solid rgba(255,255,255,0.1);
      --font-title: 'Poppins', sans-serif;
      --bg-pattern: none;
    }

    body { 
      font-family: 'Poppins', sans-serif !important; 
      color: #f0f0f0; overflow-x: hidden; transition: background 0.5s ease;
      background-color: var(--bg-main) !important;
      background-image: var(--bg-pattern) !important;
      background-attachment: fixed;
    }

    /* =========================================
       ★ IDENTITÉS VISUELLES (LES THÈMES) ★
       ========================================= */

    /* 1. ⭐ AI HOSHINO (Glassmorphism, Scène Pop) */
    [data-theme='ai'] { 
      --theme-color: #ff55aa; --theme-dim: rgba(255,85,170,0.2); 
      --bg-main: #0a0105; --bg-pattern: radial-gradient(circle at 50% -20%, #2a0a1a 0%, #0a0105 80%);
      --ui-radius: 20px; /* Très arrondi */
      --ui-backdrop: blur(20px);
      --sidebar-bg: rgba(10, 2, 5, 0.6);
      --title-shadow: 0 0 20px var(--theme-color);
    }

    /* 2. 🎬 AQUA HOSHINO (Cinéma Sombre, Scanlines, Sharp) */
    [data-theme='aqua'] { 
      --theme-color: #00eeff; --theme-dim: rgba(0,238,255,0.1); 
      --bg-main: #020202; 
      /* Effet Scanline d'écran cathodique */
      --bg-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,238,255,0.03) 2px, rgba(0,238,255,0.03) 4px);
      --ui-radius: 0px; /* Brut, tranchant */
      --ui-border: 1px solid var(--theme-color);
      --ui-backdrop: none;
      --sidebar-bg: #050505;
      --title-shadow: none;
    }
    [data-theme='aqua'] .sidebar h1 { border-bottom: 3px double var(--theme-color); letter-spacing: 5px; }

    /* 3. ❤️ RUBY HOSHINO (Énergie, Dégradés) */
    [data-theme='ruby'] { 
      --theme-color: #ff0055; --theme-dim: rgba(255,0,85,0.2); 
      --bg-main: #0a0002; --bg-pattern: linear-gradient(135deg, #1a0005 0%, #000000 100%);
      --ui-radius: 12px;
      --sidebar-bg: linear-gradient(180deg, rgba(20,0,5,0.9) 0%, rgba(0,0,0,0.9) 100%);
      --hover-transform: translateY(-5px) scale(1.02); /* Effet de rebond */
      --title-shadow: 0 5px 15px rgba(255,0,85,0.5);
    }

    /* 4. 🎭 KANA ARIMA (Théâtre Classique, Élégance) */
    [data-theme='kana'] { 
      --theme-color: #ffffff; --theme-dim: rgba(255,255,255,0.1); 
      --bg-main: #0f0305; --bg-pattern: radial-gradient(circle at 50% 50%, #1a0508 0%, #050102 100%);
      --ui-radius: 4px;
      --ui-border: 2px solid #331118;
      --sidebar-bg: #0a0204;
      --font-title: 'Playfair Display', serif; /* Police de théâtre/roman */
      --title-shadow: 2px 2px 0px #880022;
    }
    [data-theme='kana'] .markdown-section h1, [data-theme='kana'] .sidebar h1 { font-family: var(--font-title); text-transform: none; font-style: italic; }

    /* 5. 🌊 AKANE KUROKAWA (Abysses Psychologiques) */
    [data-theme='akane'] { 
      --theme-color: #5577ff; --theme-dim: rgba(85,119,255,0.15); 
      --bg-main: #01010a; 
      --bg-pattern: radial-gradient(circle at 20% 30%, rgba(30,40,100,0.3) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(20,20,80,0.4) 0%, transparent 50%);
      --ui-radius: 16px;
      --sidebar-bg: rgba(2, 2, 10, 0.7);
      --ui-backdrop: blur(10px);
      --title-shadow: 0 0 30px #5577ff;
    }

    /* 6. 📱 MEM-CHO (Pop Art Internet, Néo-Brutalisme) */
    [data-theme='memcho'] { 
      --theme-color: #ffcc00; --theme-dim: rgba(255,204,0,0.2); 
      --bg-main: #111100; 
      /* Fond Polka Dots (Petits points) */
      --bg-pattern: radial-gradient(rgba(255,204,0,0.15) 2px, transparent 2px);
      background-size: 20px 20px !important;
      --ui-radius: 8px;
      --ui-border: 3px solid #ffcc00; /* Bordures épaisses */
      --sidebar-bg: #0a0a00;
      --title-shadow: 4px 4px 0px #554400; /* Ombre décalée Pop-Art */
    }
    /* Menu décalé pour Mem-cho */
    [data-theme='memcho'] .sidebar { box-shadow: 8px 0px 0px #ffcc00; }
    [data-theme='memcho'] .markdown-section pre { box-shadow: 8px 8px 0px var(--theme-color) !important; }

    /* =========================================
       ★ STRUCTURE UI DYNAMIQUE ★
       ========================================= */
    ::selection { background: var(--theme-color); color: #000; }

    #reading-progress { position: fixed; top: 0; left: 0; height: 3px; background: var(--theme-color); z-index: 9999; width: 0%; box-shadow: 0 0 15px var(--theme-color); }

    /* Conteneur d'effets de fond générés en JS */
    #fx-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: -2; overflow: hidden; }

    /* SIDEBAR ADAPTATIVE */
    .sidebar { 
      width: var(--sidebar-width) !important;
      background: var(--sidebar-bg) !important; 
      backdrop-filter: var(--ui-backdrop); -webkit-backdrop-filter: var(--ui-backdrop);
      border-right: var(--ui-border) !important;
      border-radius: 0 var(--ui-radius) var(--ui-radius) 0;
      transition: width 0.3s, background 0.5s, border 0.5s, border-radius 0.5s;
    }
    .content { left: var(--sidebar-width) !important; transition: none; }

    .sidebar h1 { font-family: var(--font-title); font-weight: 900; color: #fff; text-shadow: var(--title-shadow); border-bottom: 2px solid var(--theme-color); padding-bottom: 15px; text-align: center; margin-top: 10px; }
    
    .search input { 
      background: rgba(0,0,0,0.5) !important; border: var(--ui-border) !important; color: #fff !important; 
      border-radius: var(--ui-radius) !important; padding: 12px 15px !important; transition: 0.3s !important; 
    }
    .search input:focus { border-color: var(--theme-color) !important; box-shadow: 0 0 15px var(--theme-dim) !important; }

    /* NAVIGATION DU MENU */
    .sidebar-nav ul li a { 
      white-space: normal !important; word-wrap: break-word; line-height: 1.4;
      transition: all 0.3s; font-weight: 500; color: #aaa; padding: 10px 15px; border-radius: var(--ui-radius); margin: 2px 10px; display: block; 
    }
    .sidebar-nav ul li a:hover { color: #fff; background: rgba(255,255,255,0.05); transform: var(--hover-transform, translateX(5px)); }
    
    .sidebar-nav li.collapse > a::before { content: "▶" !important; font-size: 10px; margin-right: 12px; transition: 0.4s; display: inline-block; }
    .sidebar-nav li.collapse:not(.close) > a { color: #fff !important; font-weight: 800 !important; background: linear-gradient(90deg, var(--theme-dim), transparent); border-left: 4px solid var(--theme-color); }
    .sidebar-nav li.collapse:not(.close) > a::before { transform: rotate(90deg); color: var(--theme-color) !important; text-shadow: var(--title-shadow); }
    
    .sidebar-nav ul li.active > a { color: #000 !important; font-weight: 800; background: var(--theme-color); transform: scale(1.02); }

    /* CONTENU MARKDOWN ADAPTATIF */
    .markdown-section h1, .markdown-section h2 { font-family: var(--font-title); font-weight: 900; color: #fff; text-shadow: var(--title-shadow); margin-top: 50px; }
    .markdown-section a { color: var(--theme-color); font-weight: 800; text-decoration: none; border-bottom: 1px dashed var(--theme-color); }
    
    .markdown-section pre { background: #080808 !important; border: var(--ui-border); border-radius: var(--ui-radius); padding-top: 40px !important; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
    .markdown-section pre::before { content: '/// CODE'; position: absolute; top: 10px; left: 15px; color: #555; font-size: 12px; font-weight: 900; letter-spacing: 2px; }
    
    .docsify-copy-code-button { background: #111 !important; color: #fff !important; border: var(--ui-border) !important; border-radius: var(--ui-radius) !important; padding: 5px 12px !important; top: 10px !important; right: 10px !important; }
    
    .markdown-section blockquote { border-left: 5px solid var(--theme-color); background: var(--theme-dim); padding: 20px; border-radius: 0 var(--ui-radius) var(--ui-radius) 0; font-style: italic; }

    /* PAGINATION */
    .docsify-pagination-container { display: flex !important; justify-content: space-between !important; gap: 20px !important; margin-top: 60px !important; padding-top: 30px !important; border-top: var(--ui-border) !important; flex-wrap: wrap; }
    .pagination-item a { display: flex !important; flex-direction: column !important; align-items: center !important; text-align: center; background: rgba(0,0,0,0.4) !important; border: var(--ui-border) !important; border-radius: var(--ui-radius) !important; padding: 25px 20px !important; transition: all 0.3s ease !important; width: 100% !important; }
    .pagination-item a:hover { background: var(--theme-dim) !important; border-color: var(--theme-color) !important; transform: var(--hover-transform, translateY(-3px)) !important; }
    .pagination-item-title { font-weight: 800 !important; color: #fff !important; }
    .pagination-item-label { color: var(--theme-color) !important; font-weight: 800; text-transform: uppercase; }

    /* =========================================
       ★ THEME PICKER ★
       ========================================= */
    #theme-picker {
      position: fixed; top: 15px; right: 25px; z-index: 1000;
      background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px);
      padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2);
      display: flex; gap: 12px; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.9);
    }
    #theme-picker span { color: #fff; font-size: 11px; font-weight: 900; letter-spacing: 2px; margin-right: 8px; opacity: 0.6; }
    .theme-dot { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.3); transition: 0.3s; }
    .theme-dot:hover { transform: scale(1.5); border-color: #fff; box-shadow: 0 0 15px currentColor; }
    .dot-kana { border-color: #66001a; }

    /* CLASSES D'ANIMATIONS (Gérées par JS) */
    .fx-star { position: absolute; opacity: 0; animation: twinkle linear infinite; }
    .fx-heart { position: absolute; opacity: 0; animation: floatUp linear infinite; }
    .fx-orb { position: absolute; border-radius: 50%; opacity: 0; animation: pulseOrb ease-in-out infinite alternate; filter: blur(8px); }
    .fx-pixel { position: absolute; opacity: 0; font-family: 'Fira Code'; font-weight: bold; animation: glitch linear infinite; }

    @keyframes twinkle { 0% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.8; transform: scale(1.2); } 100% { opacity: 0; transform: scale(0.5); } }
    @keyframes floatUp { 0% { opacity: 0; transform: translateY(20px) scale(0.8); } 50% { opacity: 0.6; } 100% { opacity: 0; transform: translateY(-50px) scale(1.2); } }
    @keyframes pulseOrb { 0% { opacity: 0.1; transform: scale(1); } 100% { opacity: 0.4; transform: scale(2); } }
    @keyframes glitch { 0%, 100% { opacity: 0; } 5% { opacity: 1; transform: translateX(-2px); } 10% { opacity: 0; transform: translateX(2px); } }

  </style>
</head>
<body>

  <div id="reading-progress"></div>
  <div id="fx-container"></div>

  <div id="theme-picker">
    <span>推し</span>
    <div class="theme-dot" style="background:#ff55aa; color:#ff55aa" onclick="setTheme('ai')" title="Ai (Glass & Pop)"></div>
    <div class="theme-dot" style="background:#ff0044; color:#ff0044" onclick="setTheme('ruby')" title="Ruby (Énergie)"></div>
    <div class="theme-dot" style="background:#00eeff; color:#00eeff" onclick="setTheme('aqua')" title="Aqua (Cinéma Sombre)"></div>
    <div class="theme-dot dot-kana" style="background:#ffffff; color:#ffffff" onclick="setTheme('kana')" title="Kana (Théâtre Élégant)"></div>
    <div class="theme-dot" style="background:#5577ff; color:#5577ff" onclick="setTheme('akane')" title="Akane (Abysses)"></div>
    <div class="theme-dot" style="background:#ffcc00; color:#ffcc00" onclick="setTheme('memcho')" title="Mem-cho (Pop Brutalisme)"></div>
  </div>

  <div id="app">Chargement...</div>

  <script>
    // --- MOTEUR DE THÈMES DYNAMIQUE ---
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('solus-wiki-theme', theme);
      
      const themeColor = getComputedStyle(document.documentElement).getPropertyValue('--theme-color').trim();
      if (window.$docsify) window.$docsify.themeColor = themeColor;
      
      generateEffects(theme, themeColor);
    }

    // Génère des effets visuels en fonction de l'aura du personnage
    function generateEffects(theme, color) {
      const container = document.getElementById('fx-container');
      container.innerHTML = ''; // Reset
      
      let count = 40;
      let types = [];
      let charArray = [];

      // Définition du style selon le thème
      if (theme === 'ai') { charArray = ['★', '✧']; types = ['fx-star']; }
      else if (theme === 'ruby') { charArray = ['♥', '♡']; types = ['fx-heart']; }
      else if (theme === 'aqua') { charArray = ['/', '\\', '[', ']']; types = ['fx-pixel']; count = 60; }
      else if (theme === 'kana') { charArray = ['✨', '✦']; types = ['fx-star']; count = 30; }
      else if (theme === 'akane') { charArray = ['']; types = ['fx-orb']; count = 15; }
      else if (theme === 'memcho') { charArray = ['▲', '●', '■']; types = ['fx-star']; count = 25; }

      for (let i = 0; i < count; i++) {
        let fx = document.createElement('div');
        fx.className = types[Math.floor(Math.random() * types.length)];
        
        if (theme === 'akane') {
          // Création d'orbes floues pour Akane
          fx.style.width = (Math.random() * 100 + 50) + 'px';
          fx.style.height = fx.style.width;
          fx.style.background = color;
        } else {
          fx.innerHTML = charArray[Math.floor(Math.random() * charArray.length)];
          fx.style.color = color;
          fx.style.fontSize = (Math.random() * 15 + 8) + 'px';
          fx.style.textShadow = `0 0 10px ${color}`;
        }
        
        fx.style.left = Math.random() * 100 + 'vw';
        fx.style.top = Math.random() * 100 + 'vh';
        fx.style.animationDuration = (Math.random() * 6 + 3) + 's';
        fx.style.animationDelay = (Math.random() * 5) + 's';
        container.appendChild(fx);
      }
    }

    setTheme(localStorage.getItem('solus-wiki-theme') || 'ai');

    // Barre de progression
    window.addEventListener('scroll', () => {
      let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
      let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      document.getElementById('reading-progress').style.width = (winScroll / height) * 100 + "%";
    });

    // Configuration Docsify
    window.$docsify = {
      name: 'Solus Wiki',
      repo: '', loadSidebar: true, subMaxLevel: 3, sidebarDisplayLevel: 1, auto2top: true,
      search: { placeholder: '🔎 Rechercher...', noData: '❌ Rien trouvé.' },
      copyCode: { buttonText: '📋 Copier', successText: '✨ Copié !' },
      pagination: { previousText: 'Chapitre Précédent', nextText: 'Chapitre Suivant', crossChapter: true },
      tabs: { persist: true, sync: true, theme: 'classic' }
    }
  </script>

  <!-- SCRIPTS REQUIS -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  
</body>
</html>
